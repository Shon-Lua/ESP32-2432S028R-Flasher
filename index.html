<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FLASHER</title>
  <link rel="icon" href="Logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --glow-cyan: rgba(0, 255, 255, 0.7);
      --glow-purple: rgba(108, 110, 255, 0.9);
      --glass-bg: rgba(8, 8, 22, 0.72);
      --border-glow: 0 0 14px rgba(108, 110, 255, 0.5);
      --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    html, body {
      height: 100%;
      background: #020108;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      line-height: 1.5;
      overflow: hidden;
      height: calc(var(--vh, 1vh) * 100);
      background: radial-gradient(ellipse at 30% 10%, #0d0d2b 0%, #020105 70%);
    }

    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0c0c24 0%, #000000 100%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(14px);
      transition: opacity 0.6s ease, visibility 0.6s;
      opacity: 1;
      pointer-events: auto;
    }

    .splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 200px;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.8)) brightness(1.2);
      animation: cosmicPulse 2s infinite alternate ease-in-out, logoFloat 3s infinite ease-in-out;
      margin-bottom: 2rem;
      transition: transform 0.3s;
    }

    @keyframes cosmicPulse {
      0% { filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.6)); transform: scale(0.96); }
      100% { filter: drop-shadow(0 0 44px rgba(0, 212, 255, 0.95)); transform: scale(1.04); }
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .splash-text {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e0e0ff, #9d9dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: textPulse 2.2s infinite;
    }

    @keyframes textPulse {
      0% { opacity: 0.7; letter-spacing: 5px; text-shadow: 0 0 6px rgba(0, 255, 255, 0.5); }
      50% { opacity: 1; letter-spacing: 6.5px; text-shadow: 0 0 14px cyan; }
      100% { opacity: 0.7; letter-spacing: 5px; text-shadow: 0 0 6px rgba(0, 255, 255, 0.5); }
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(16px);
      z-index: 998;
      display: none;
      transition: opacity 0.3s;
    }

    .sidebar-overlay.active {
      display: block;
    }

    .app-wrapper {
      display: none;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .sidebar {
      width: 300px;
      background: rgba(4, 4, 16, 0.94);
      backdrop-filter: blur(22px);
      border-right: 1px solid rgba(80, 100, 220, 0.55);
      padding: 2rem 1.2rem;
      flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      z-index: 999;
      overflow-y: auto;
      box-shadow: 18px 0 50px rgba(0, 0, 0, 0.6);
    }

    .sidebar h2 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 1.6rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(100, 120, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(125deg, #ffffff, #aab2ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(140, 140, 255, 0.4);
    }

    .search-wrapper {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 2rem;
      align-items: center;
    }

    .search-box {
      flex: 1;
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #a09eff;
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.3s;
    }

    .search-box input {
      width: 100%;
      background: rgba(22, 22, 40, 0.85);
      border: 1.5px solid rgba(100, 110, 220, 0.6);
      padding: 0 0.8rem 0 2.3rem;
      color: #f2f2ff;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      outline: none;
      height: 46px;
      border-radius: 30px;
      transition: var(--transition-smooth);
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .search-box input:focus {
      border-color: #6c6eff;
      box-shadow: 0 0 20px var(--glow-purple);
      background: rgba(8, 8, 24, 0.95);
    }

    .search-box input:focus + i,
    .search-box input:focus ~ i {
      color: #ffffff;
    }

    .firmware-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .fw-item {
      background: rgba(18, 18, 36, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 110, 190, 0.55);
      padding: 1rem 1.2rem;
      border-radius: 28px;
      transition: all 0.3s cubic-bezier(0.22, 0.9, 0.35, 1.1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .fw-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(108, 110, 255, 0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.7s;
    }

    .fw-item:hover::before {
      transform: translateX(100%);
    }

    .fw-item.active {
      border-left: 5px solid #6c6eff;
      background: linear-gradient(135deg, rgba(45, 45, 90, 0.95), rgba(20, 20, 60, 0.98));
      box-shadow: 0 0 28px rgba(108, 110, 255, 0.55), inset 0 1px 0 rgba(255,255,255,0.12);
      transform: scale(1.01);
      animation: activeGlow 2s infinite alternate;
    }

    @keyframes activeGlow {
      0% { box-shadow: 0 0 20px rgba(108, 110, 255, 0.4); }
      100% { box-shadow: 0 0 34px rgba(130, 140, 255, 0.7); }
    }

    .fw-name {
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: -0.2px;
    }

    .fw-name i {
      font-size: 1rem;
      color: #bbc2ff;
      filter: drop-shadow(0 0 5px cyan);
      transition: transform 0.3s;
    }

    .fw-item:hover .fw-name i {
      transform: scale(1.2) rotate(5deg);
    }

    .fw-desc {
      font-size: 0.72rem;
      color: #cdd0ff;
      line-height: 1.4;
      font-weight: 400;
    }

    .main-content {
      flex: 1;
      padding: 1.8rem;
      padding-top: 1.2rem;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow-y: auto;
      background: radial-gradient(ellipse at 70% 20%, rgba(30, 30, 70, 0.25), transparent 70%);
      position: relative;
    }

    .mobile-menu-btn {
      display: none;
      background: rgba(15, 15, 35, 0.9);
      backdrop-filter: blur(18px);
      border: 1.5px solid rgba(110, 130, 255, 0.9);
      width: 52px;
      height: 52px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 1.4rem;
      color: white;
      font-size: 1.6rem;
      flex-shrink: 0;
      border-radius: 28px;
      transition: var(--transition-smooth);
      box-shadow: 0 0 14px rgba(100, 100, 255, 0.5);
      animation: subtlePulse 2.5s infinite;
    }

    @keyframes subtlePulse {
      0% { box-shadow: 0 0 10px rgba(100, 100, 255, 0.3); }
      50% { box-shadow: 0 0 24px rgba(130, 140, 255, 0.8); }
      100% { box-shadow: 0 0 10px rgba(100, 100, 255, 0.3); }
    }

    .flasher-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border-radius: 48px;
      padding: 1.8rem;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.65), inset 0 1px 1px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(110, 120, 200, 0.5);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .flasher-card::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(100, 100, 255, 0.1), transparent 60%);
      pointer-events: none;
      animation: cardGradientMove 8s infinite linear;
    }

    @keyframes cardGradientMove {
      0% { transform: rotate(0deg); opacity: 0.3; }
      50% { opacity: 0.7; }
      100% { transform: rotate(360deg); opacity: 0.3; }
    }

    h3 {
      font-size: 1.5rem;
      margin-bottom: 1.6rem;
      font-weight: 700;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #f0f2ff, #b0b9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 6px rgba(120, 120, 255, 0.5);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      background: rgba(0, 0, 0, 0.6);
      border: 1.5px solid rgba(140, 150, 255, 0.95);
      color: #f5f5ff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.85rem 1.8rem;
      cursor: pointer;
      transition: var(--transition-smooth);
      letter-spacing: 0.6px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      align-self: flex-start;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s, opacity 0.4s;
    }

    .btn:active::after {
      width: 300px;
      height: 300px;
      opacity: 0;
    }

    .btn i {
      font-size: 1rem;
      transition: transform 0.25s;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .port-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
      background: rgba(8, 8, 20, 0.7);
      padding: 1rem 1.4rem;
      border-radius: 40px;
      border: 1px solid rgba(100, 110, 200, 0.7);
      flex-shrink: 0;
      backdrop-filter: blur(8px);
      transition: border-color 0.3s;
    }

    .port-section:focus-within {
      border-color: #a0a8ff;
      box-shadow: 0 0 16px rgba(108, 110, 255, 0.4);
    }

    .port-status {
      font-size: 0.8rem;
      font-family: 'Inter', monospace;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(108, 110, 255, 0.7);
      color: #cfd9ff;
      flex: 1;
      word-break: break-all;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .active-fw-indicator {
      background: linear-gradient(95deg, rgba(25, 30, 68, 0.92), rgba(15, 20, 50, 0.92));
      padding: 0.9rem 1.4rem;
      margin-bottom: 1.6rem;
      border-left: 5px solid #6c6eff;
      border-radius: 32px;
      font-size: 0.85rem;
      font-weight: 600;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: indicatorBorderPulse 3s infinite alternate;
    }

    @keyframes indicatorBorderPulse {
      0% { border-left-color: #6c6eff; }
      100% { border-left-color: #b0baff; }
    }

    .log-terminal {
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(80, 100, 200, 0.8);
      border-radius: 28px;
      padding: 1.2rem;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      margin-top: 1.5rem;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      line-height: 1.6;
      box-shadow: inset 0 0 22px rgba(0,0,0,0.8), 0 2px 8px rgba(0,0,0,0.3);
      clip-path: inset(0 0 0 0 round 28px);
    }

    .log-line {
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(100, 110, 180, 0.25);
      display: flex;
      gap: 0.8rem;
      font-size: 0.72rem;
      font-weight: 450;
      opacity: 0;
      transform: translateY(6px);
      animation: logSlideFade 0.22s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }

    @keyframes logSlideFade {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .log-prefix {
      color: #8a8eff;
      font-weight: 700;
      text-shadow: 0 0 4px cyan;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.3);
      box-shadow: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .btn:hover {
        background: #ffffff;
        color: #0a0a1a;
        border-color: #ffffff;
        box-shadow: 0 12px 30px rgba(100, 100, 255, 0.7), 0 0 25px rgba(0, 200, 255, 0.5);
        transform: translateY(-3px);
      }
      .btn:hover i {
        color: #0a0a1a;
        transform: scale(1.1) rotate(-3deg);
      }
      .fw-item:hover {
        transform: translateX(8px) scale(1.02);
        border-color: #a0a8ff;
        background: rgba(40, 40, 80, 0.95);
        box-shadow: -6px 12px 26px rgba(0, 0, 0, 0.7);
      }
      .mobile-menu-btn:hover {
        background: rgba(90, 110, 210, 0.8);
        border-color: #fff;
        transform: scale(1.05);
        box-shadow: 0 0 28px rgba(130, 150, 255, 0.9);
      }
    }

    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
        width: 280px;
        border-radius: 0 32px 32px 0;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        padding: 1rem;
        padding-top: 0.5rem;
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
      }
      .flasher-card {
        padding: 1.3rem;
        border-radius: 32px;
      }
      .port-section {
        flex-direction: column;
        align-items: stretch;
      }
      .btn {
        justify-content: center;
        align-self: stretch;
      }
      .splash-logo {
        width: 150px;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(18, 18, 36, 0.85);
      border-radius: 12px;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #6c6eff, #a0a6ff);
      border-radius: 12px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #bbc2ff;
    }
  </style>
</head>
<body>
<div class="splash" id="splash">
  <img src="Logo.png" alt="Logo" class="splash-logo">
  <div class="splash-text">INITIALIZING CORE MODULES</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-wrapper" id="appWrapper">
  <div class="sidebar" id="sidebar">
    <h2><i class="fas fa-microchip"></i> FIRMWARE VAULT</h2>
    <div class="search-wrapper">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchFirmware" placeholder="Search firmware...">
      </div>
    </div>
    <div class="firmware-list" id="firmwareListContainer"></div>
  </div>

  <div class="main-content">
    <button class="mobile-menu-btn" id="menuToggleBtn"><i class="fas fa-bolt"></i></button>

    <div class="flasher-card">
      <h3><i class="fas fa-satellite-dish"></i> FLASH CONTROLLER</h3>
      <div class="port-section">
        <button id="selectPortBtn" class="btn"><i class="fas fa-plug"></i> SELECT PORT</button>
        <span id="portStatus" class="port-status"><i class="fas fa-circle-notch"></i> No port selected</span>
      </div>

      <div id="activeFirmwareDisplay" class="active-fw-indicator">
        <i class="fas fa-info-circle"></i> No firmware selected
      </div>

      <button id="flashActionBtn" class="btn" disabled><i class="fas fa-bolt"></i> EXECUTE FLASH</button>

      <div class="log-terminal" id="logTerminal">
      </div>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "esptool-js": "https://unpkg.com/esptool-js@0.5.4/bundle.js"
    }
  }
</script>

<script type="module">
  import * as esptoolModule from 'esptool-js';
  const { ESPLoader, Transport } = esptoolModule;

  let selectedPort = null;
  let flashingInProgress = false;
  let currentFirmwareCacheKey = null;
  let currentBootloaderData = null;
  let currentPartitionsData = null;
  let currentAppData = null;
  let currentFirmwareName = null;

  const firmwareCache = new Map();

  const splash = document.getElementById('splash');
  const appWrapper = document.getElementById('appWrapper');
  const selectPortBtn = document.getElementById('selectPortBtn');
  const portStatusSpan = document.getElementById('portStatus');
  const flashBtn = document.getElementById('flashActionBtn');
  const logContainer = document.getElementById('logTerminal');
  const activeFirmwareDisplay = document.getElementById('activeFirmwareDisplay');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const menuToggle = document.getElementById('menuToggleBtn');
  const searchInput = document.getElementById('searchFirmware');
  const firmwareListContainer = document.getElementById('firmwareListContainer');

  function setViewportHeight() {
    let vh = window.innerHeight;
    document.documentElement.style.setProperty('--vh', `${vh * 0.01}px`);
  }

  window.addEventListener('resize', setViewportHeight);
  setViewportHeight();

  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
  overlay.addEventListener('click', closeSidebar);
  window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

  function addLog(msg, type='info') {
    const safeMsg = String(msg === undefined || msg === null ? '' : msg);
    const div = document.createElement('div');
    div.className = 'log-line';
    const prefix = document.createElement('span');
    prefix.className = 'log-prefix';
    prefix.innerText = '>';
    const text = document.createElement('span');
    text.className = 'log-text';
    if (type === 'error') text.style.color = '#ff9999';
    if (type === 'success') text.style.fontWeight = '600';
    text.innerText = safeMsg;
    div.appendChild(prefix);
    div.appendChild(text);
    logContainer.appendChild(div);
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  function setControlsEnabled(enabled) {
    selectPortBtn.disabled = !enabled;
    if(enabled && currentAppData && selectedPort && !flashingInProgress) flashBtn.disabled = false;
    else if(!enabled) flashBtn.disabled = true;
    else if(!currentAppData || !selectedPort) flashBtn.disabled = true;
  }

  function uint8ToBinaryString(u8) {
    let result = '';
    const chunkSize = 0x8000;
    for (let i = 0; i < u8.length; i += chunkSize) {
      const chunk = u8.subarray(i, i + chunkSize);
      result += String.fromCharCode.apply(null, chunk);
    }
    return result;
  }

  async function loadAndCacheFirmware(manifestPath, itemElement) {
    if (firmwareCache.has(manifestPath)) {
      const cached = firmwareCache.get(manifestPath);
      if (itemElement) {
        const descElem = itemElement.querySelector('.fw-desc');
        if (descElem && cached.description) descElem.innerText = cached.description;
        const nameElem = itemElement.querySelector('.fw-name');
        if (nameElem && cached.manifest.name) {
          const iconHtml = nameElem.querySelector('i') ? nameElem.querySelector('i').outerHTML : '<i class="fas fa-microchip"></i>';
          nameElem.innerHTML = `${cached.manifest.name} ${iconHtml}`;
        }
      }
      return cached;
    }

    try {
      const manifestResp = await fetch(manifestPath);
      if (!manifestResp.ok) throw new Error(`HTTP ${manifestResp.status}`);
      const manifest = await manifestResp.json();
      const basePath = manifest.basePath || manifestPath.replace("manifest.json", "");
      
      let description = "";
      const descFile = manifest.descriptionFile || "desc.txt";
      try {
        const descResp = await fetch(basePath + descFile);
        if (descResp.ok) description = await descResp.text();
        else description = manifest.description || "Firmware ready";
      } catch(e) {
        description = manifest.description || "Firmware ready";
      }
      
      let bootloaderData = null;
      let partitionsData = null;
      let appData = null;
      
      if (manifest.type === "full") {
        const [boot, part, app] = await Promise.all([
          fetch(basePath + manifest.files.bootloader).then(r => { if(!r.ok) throw new Error(`bootloader missing`); return r.arrayBuffer(); }),
          fetch(basePath + manifest.files.partitions).then(r => { if(!r.ok) throw new Error(`partitions missing`); return r.arrayBuffer(); }),
          fetch(basePath + manifest.files.app).then(r => { if(!r.ok) throw new Error(`app missing`); return r.arrayBuffer(); })
        ]);
        bootloaderData = new Uint8Array(boot);
        partitionsData = new Uint8Array(part);
        appData = new Uint8Array(app);
      } else if (manifest.type === "single") {
        const app = await fetch(basePath + manifest.file).then(r => { if(!r.ok) throw new Error(`firmware missing`); return r.arrayBuffer(); });
        appData = new Uint8Array(app);
      } else {
        throw new Error(`Unknown manifest type: ${manifest.type}`);
      }
      
      const cacheEntry = {
        manifest,
        bootloaderData,
        partitionsData,
        appData,
        description: description.trim()
      };
      firmwareCache.set(manifestPath, cacheEntry);
      
      if (itemElement) {
        const descElem = itemElement.querySelector('.fw-desc');
        if (descElem) descElem.innerText = cacheEntry.description;
        const nameElem = itemElement.querySelector('.fw-name');
        if (nameElem && manifest.name) {
          const iconHtml = nameElem.querySelector('i') ? nameElem.querySelector('i').outerHTML : '<i class="fas fa-microchip"></i>';
          nameElem.innerHTML = `${manifest.name} ${iconHtml}`;
        }
      }
      
      return cacheEntry;
    } catch(e) {
      addLog(`Failed to load ${manifestPath}: ${e.message}`, "error");
      if (itemElement) {
        const descElem = itemElement.querySelector('.fw-desc');
        if (descElem) descElem.innerText = "Failed to load description";
      }
      return null;
    }
  }

  async function selectFirmwareFromCache(manifestPath) {
    const cached = firmwareCache.get(manifestPath);
    if (!cached) {
      addLog(`Firmware not cached: ${manifestPath}`, "error");
      return false;
    }
    
    currentBootloaderData = cached.bootloaderData;
    currentPartitionsData = cached.partitionsData;
    currentAppData = cached.appData;
    currentFirmwareName = cached.manifest.name;
    currentFirmwareCacheKey = manifestPath;
    
    const size = currentAppData.length;
    activeFirmwareDisplay.innerHTML = `<i class="fas fa-check-circle"></i> ${currentFirmwareName} (${(size/1024).toFixed(2)} KB)`;
    addLog(`Selected: ${currentFirmwareName}`, "success");
    
    document.querySelectorAll('.fw-item').forEach(el => {
      if (el.getAttribute('data-manifest') === manifestPath) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });
    
    if (!flashingInProgress && selectedPort) flashBtn.disabled = false;
    else flashBtn.disabled = true;
    
    return true;
  }

  async function selectSerialPort() {
    if (flashingInProgress) { addLog("Flashing in progress, cannot change port", "error"); return; }
    if (!('serial' in navigator)) { addLog("Web Serial API not supported. Use Chrome/Edge.", "error"); return; }
    try {
      const port = await navigator.serial.requestPort();
      selectedPort = port;
      const info = port.getInfo();
      const name = info.usbProductName || info.friendlyName || 'Serial device';
      const vid = info.usbVendorId || '?';
      const pid = info.usbProductId || '?';
      portStatusSpan.innerHTML = `<i class="fas fa-check-circle"></i> Port selected: ${name} (${vid}:${pid})`;
      addLog(`Port selected: ${name}`, "success");
      if (currentAppData) flashBtn.disabled = false;
      else flashBtn.disabled = true;
    } catch(err) {
      addLog(`Port selection error: ${err.message}`, "error");
      selectedPort = null;
      portStatusSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`;
      flashBtn.disabled = true;
    }
  }

  async function hardResetDevice(transport) {
    if (!transport || typeof transport.setSignals !== 'function') {
      addLog("Signal control not supported by browser or driver. Please press RESET button manually.", "error");
      return false;
    }
    try {
      addLog("Attempting automatic hardware reset (DTR/RTS sequence)...", "info");
      await transport.setSignals({ dataTerminalReady: false, requestToSend: false });
      await new Promise(r => setTimeout(r, 50));
      await transport.setSignals({ dataTerminalReady: false, requestToSend: true });
      await new Promise(r => setTimeout(r, 50));
      await transport.setSignals({ dataTerminalReady: false, requestToSend: false });
      await new Promise(r => setTimeout(r, 100));
      addLog("Reset sequence completed. If device did not reboot, please press RESET button manually.", "success");
      return true;
    } catch (e) {
      addLog(`Automatic reset failed: ${e.message}. Please reset manually.`, "error");
      return false;
    }
  }

  async function startFlashing() {
    if (flashingInProgress) return;
    if (!selectedPort) { addLog("No serial port selected", "error"); return; }
    if (!currentAppData) { addLog("No firmware selected", "error"); return; }
    
    flashingInProgress = true;
    setControlsEnabled(false);
    let transport = null;
    let esptoolInstance = null;
    let success = false;
    
    try {
      addLog(`Preparing to flash ${currentFirmwareName}`, "info");
      transport = new Transport(selectedPort);
      esptoolInstance = new ESPLoader({
        transport: transport,
        baudrate: 921600,
        terminal: {
          clean: () => {},
          writeLine: (msg) => addLog(String(msg !== undefined ? msg : ""), "info"),
          write: (msg) => addLog(String(msg !== undefined ? msg : ""), "info")
        }
      });
      
      await esptoolInstance.main();
      addLog("Connected to ESP device", "success");
      await esptoolInstance.eraseFlash();      
      const fileArray = [];
      
      if (currentBootloaderData && currentBootloaderData.length > 0) {
        fileArray.push({
          data: uint8ToBinaryString(currentBootloaderData),
          address: 0x1000
        });
      }
      
      if (currentPartitionsData && currentPartitionsData.length > 0) {
        fileArray.push({
          data: uint8ToBinaryString(currentPartitionsData),
          address: 0x8000
        });
      }
      
      fileArray.push({
        data: uint8ToBinaryString(currentAppData),
        address: 0x10000
      });
      
      await esptoolInstance.writeFlash({
        fileArray: fileArray,
        flashSize: "keep",
        compress: true,
        eraseAll: false
      });
      
      addLog("Firmware successfully written", "success");
      await hardResetDevice(transport);
      
      try {
        await esptoolInstance.after();
      } catch (e) {
        addLog("After-flash routine completed", "info");
      }
      
      success = true;
      addLog("Flashing completed. Device should now run new firmware.", "success");
    } catch(err) {
      addLog(`Flashing error: ${err.message || String(err)}`, "error");
      success = false;
    } finally {
      flashingInProgress = false;
      if (esptoolInstance && esptoolInstance.transport) {
        try { await esptoolInstance.transport.disconnect(); } catch(e) {}
      }
      setControlsEnabled(true);
      if (!success) addLog("Flashing failed, please retry. Consider manual power cycle.", "error");
    }
  }

  function filterFirmwares() {
    const term = searchInput.value.toLowerCase();
    document.querySelectorAll('.fw-item[data-manifest]').forEach(item => {
      let name = item.querySelector('.fw-name')?.innerText?.split(' ')[0] || '';
      item.style.display = name.toLowerCase().includes(term) ? '' : 'none';
    });
  }

  async function buildFirmwareListFromProjectsJson() {
    firmwareListContainer.innerHTML = '';
    try {
      const response = await fetch('projects.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      const folders = data.folders || {};
      const folderNames = Object.values(folders);
      if (folderNames.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'fw-item';
        emptyMsg.style.cursor = 'default';
        emptyMsg.innerHTML = `<div class="fw-name">No firmwares found</div><div class="fw-desc">Check projects.json</div>`;
        firmwareListContainer.appendChild(emptyMsg);
        return;
      }
      for (const folderName of folderNames) {
        const manifestPath = `Lib/${folderName}/manifest.json`;
        const fwDiv = document.createElement('div');
        fwDiv.className = 'fw-item';
        fwDiv.setAttribute('data-manifest', manifestPath);
        fwDiv.innerHTML = `
          <div class="fw-name">${folderName} <i class="fas fa-microchip"></i></div>
          <div class="fw-desc">Loading description...</div>
        `;
        firmwareListContainer.appendChild(fwDiv);
      }
    } catch (err) {
      addLog(`Failed to load projects.json: ${err.message}`, "error");
      const errorDiv = document.createElement('div');
      errorDiv.className = 'fw-item';
      errorDiv.style.cursor = 'default';
      errorDiv.innerHTML = `<div class="fw-name">Error</div><div class="fw-desc">Could not load projects.json</div>`;
      firmwareListContainer.appendChild(errorDiv);
    }
  }

  async function initializeAllFirmwares() {
    const items = document.querySelectorAll('.fw-item[data-manifest]');
    const loadPromises = [];
    items.forEach(item => {
      const manifestPath = item.getAttribute('data-manifest');
      loadPromises.push(loadAndCacheFirmware(manifestPath, item));
    });
    await Promise.all(loadPromises);
    
    document.querySelectorAll('.fw-item[data-manifest]').forEach(item => {
      const manifestPath = item.getAttribute('data-manifest');
      item.addEventListener('click', async () => {
        if (flashingInProgress) { addLog("Cannot change firmware while flashing", "error"); return; }
        await selectFirmwareFromCache(manifestPath);
        if (window.innerWidth <= 768) closeSidebar();
      });
    });
  }

  async function preloadResources() {
    await new Promise((resolve) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = "Logo.png";
    });
    await buildFirmwareListFromProjectsJson();
    await initializeAllFirmwares();
  }

  searchInput.addEventListener('input', filterFirmwares);
  selectPortBtn.addEventListener('click', selectSerialPort);
  flashBtn.addEventListener('click', startFlashing);

  if (!('serial' in navigator)) { addLog("Web Serial API unavailable", "error"); selectPortBtn.disabled = true; }

  async function boot() {
    try {
      await preloadResources();
    } catch (err) {
      addLog(`Initialization error: ${err.message}`, "error");
    }
    splash.classList.add('hidden');
    setTimeout(() => {
      splash.style.display = 'none';
      if (appWrapper) appWrapper.style.display = 'flex';
      addLog("WebFlasher ready. Select firmware from firmware vault, then choose port and flash.", "info");
    }, 500);
  }

  boot();
</script>
