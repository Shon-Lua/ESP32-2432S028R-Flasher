<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ESP32-2432S028R WEBFLASHER</title>
  <link rel="icon" href="Logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body { background-color: #000000; font-family: 'Inter', sans-serif; color: #ffffff; line-height: 1.5; overflow-x: hidden; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 998; display: none; }
    .sidebar-overlay.active { display: block; }
    .app-wrapper { display: flex; min-height: 100vh; position: relative; }
    .sidebar { width: 280px; background: #050505; border-right: 1px solid #1f1f1f; padding: 2rem 1rem; flex-shrink: 0; transition: transform 0.25s ease; z-index: 999; }
    .sidebar h2 { font-size: 1.2rem; font-weight: 500; letter-spacing: -0.2px; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 8px; }
    .search-box { margin-bottom: 1.5rem; position: relative; }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 0.8rem; }
    .search-box input { width: 100%; background: #0b0b0b; border: 1px solid #262626; padding: 0.6rem 0.6rem 0.6rem 2rem; color: white; font-family: 'Inter', sans-serif; font-size: 0.8rem; outline: none; }
    .search-box input:focus { border-color: #ffffff; }
    .firmware-list { display: flex; flex-direction: column; gap: 1.2rem; max-height: calc(100vh - 180px); overflow-y: auto; }
    .fw-item { background: #0b0b0b; border: 1px solid #262626; padding: 1rem; transition: all 0.2s ease; cursor: pointer; }
    .fw-item:hover { border-color: #4a4a4a; background: #0f0f0f; }
    .fw-item.active { border-left: 3px solid #ffffff; background: #111111; border-color: #ffffff #262626 #262626 #ffffff; }
    .fw-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.4rem; display: flex; justify-content: space-between; align-items: center; }
    .fw-name i { font-size: 0.8rem; color: #ffffff; }
    .fw-desc { font-size: 0.7rem; color: #aaaaaa; line-height: 1.3; }
    .main-content { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; min-width: 0; }
    .mobile-menu-btn { display: none; background: transparent; border: 1px solid #ffffff; width: 42px; height: 42px; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 1rem; color: white; font-size: 1.4rem; }
    .header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 1px solid #2a2a2a; padding-bottom: 1rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .card { background: #0a0a0a; border: 1px solid #222222; }
    .flasher-card { background: #0c0c0c; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5); }
    h3 { font-size: 1.2rem; margin-bottom: 1rem; font-weight: 500; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.65rem; background: transparent; border: 1.5px solid #ffffff; color: #ffffff; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.9rem; padding: 0.7rem 1.2rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); letter-spacing: 0.3px; background-color: transparent; border-radius: 0px; }
    .btn i { font-size: 1rem; color: #ffffff; transition: color 0.2s; }
    .btn:hover { background-color: #ffffff; color: #000000; border-color: #ffffff; }
    .btn:hover i { color: #000000; }
    .port-section { display: flex; flex-wrap: wrap; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; background: #050505; padding: 0.8rem; border-left: 3px solid #2c2c2c; }
    .port-status { font-size: 0.75rem; font-family: monospace; background: #0f0f0f; padding: 0.4rem 0.8rem; border: 1px solid #2a2a2a; color: #dddddd; flex: 1; word-break: break-all; }
    .active-fw-indicator { background: #0a0a0a; padding: 0.6rem 1rem; margin-bottom: 1.5rem; border-left: 3px solid #ffffff; font-size: 0.75rem; }
    .progress-section { margin: 1.5rem 0 1.2rem; }
    .progress-bar-container { background: #1c1c1c; height: 6px; width: 100%; margin: 0.5rem 0 0.3rem; }
    .progress-fill { width: 0%; height: 100%; background-color: #ffffff; transition: width 0.25s ease-out; }
    .progress-percent { text-align: right; font-size: 0.7rem; font-weight: 500; color: #bbbbbb; }
    .log-terminal { background: #030303; border: 1px solid #252525; padding: 0.8rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.7rem; margin-top: 1.5rem; max-height: 200px; overflow-y: auto; }
    .log-line { padding: 0.2rem 0; border-bottom: 1px dotted #1e1e1e; display: flex; gap: 0.7rem; }
    .log-prefix { color: #9e9e9e; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    @media (max-width: 768px) {
      .mobile-menu-btn { display: flex; }
      .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); z-index: 1000; width: 260px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 1rem; }
      .header { margin-top: 0.5rem; }
      .logo h1 { font-size: 1.2rem; }
      .port-section { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
      .flasher-card { padding: 1.2rem; }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #444; }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-wrapper">
  <div class="sidebar" id="sidebar">
    <h2><i class="fas fa-microchip"></i> Firmware library</h2>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchFirmware" placeholder="Search firmware...">
    </div>
    <div class="firmware-list" id="firmwareListContainer">
      <div class="fw-item" data-fw="NanoDrive" data-file="NanoDrive.bin">
        <div class="fw-name">NanoDrive <i class="fas fa-calculator"></i></div>
        <div class="fw-desc">Extensive calculator firmware: high‑precision math, scripting engine, real‑time data logging.</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <button class="mobile-menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
    <div class="header">
      <div class="logo">
        <h1>ESP32-2432S028R WEBFLASHER</h1>
      </div>
    </div>

    <div class="card flasher-card">
      <h3><i class="fas fa-satellite-dish"></i> Flash interface</h3>
      <div class="port-section">
        <button id="selectPortBtn" class="btn"><i class="fas fa-plug"></i> Select port</button>
        <span id="portStatus" class="port-status"><i class="fas fa-circle-notch"></i> No port selected</span>
      </div>

      <div id="activeFirmwareDisplay" class="active-fw-indicator">
        <i class="fas fa-info-circle"></i> No firmware selected
      </div>

      <button id="flashActionBtn" class="btn" disabled><i class="fas fa-bolt"></i> FLASH FIRMWARE</button>

      <div class="progress-section">
        <div class="progress-bar-container">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>

      <div class="log-terminal" id="logTerminal">
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">System ready — waiting for serial connection</span></div>
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">ESP32-2432S028R WebFlasher core active</span></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const slipEncode = (buffer) => {
    let encoded = [0xc0];
    for (let byte of buffer) {
      if (byte == 0xdb) encoded = encoded.concat([0xdb, 0xdd]);
      else if (byte == 0xc0) encoded = encoded.concat([0xdb, 0xdc]);
      else encoded.push(byte);
    }
    encoded.push(0xc0);
    return encoded;
  };
  const toByteArray = (str) => {
    let arr = [];
    for (let i = 0; i < str.length; i++) {
      let c = str.charCodeAt(i);
      if (c <= 0xff) arr.push(c);
    }
    return arr;
  };
  const toHex = (v, s=2) => "0x" + v.toString(16).padStart(s, "0").toUpperCase();
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  
  const pack = (fmt, ...vals) => {
    let idx = 0;
    if (fmt.replace(/[<>]/g, '').length !== vals.length) throw new Error("Pack length mismatch");
    let le = true, out = [];
    for (let ch of fmt) {
      if (ch === '<') le = true;
      else if (ch === '>') le = false;
      else {
        let v = vals[idx++];
        let buf = new ArrayBuffer(4);
        let dv = new DataView(buf);
        if (ch === 'B') dv.setUint8(0, v);
        else if (ch === 'H') dv.setUint16(0, v, le);
        else if (ch === 'I') dv.setUint32(0, v, le);
        else if (ch === 'b') dv.setInt8(0, v);
        else if (ch === 'h') dv.setInt16(0, v, le);
        else if (ch === 'i') dv.setInt32(0, v, le);
        else throw new Error("Unknown pack type");
        for (let i = 0; i < (ch === 'B' ? 1 : (ch === 'H' ? 2 : 4)); i++) out.push(dv.getUint8(i));
      }
    }
    return out;
  };
  const unpack = (fmt, bytes) => {
    let ptr = 0, le = true, out = [];
    for (let ch of fmt) {
      if (ch === '<') le = true;
      else if (ch === '>') le = false;
      else {
        let size = (ch === 'B' || ch === 'b') ? 1 : ((ch === 'H' || ch === 'h') ? 2 : 4);
        let buf = new ArrayBuffer(size);
        let dv = new DataView(buf);
        for (let i = 0; i < size; i++) dv.setUint8(i, bytes[ptr++]);
        if (ch === 'B') out.push(dv.getUint8(0));
        else if (ch === 'H') out.push(dv.getUint16(0, le));
        else if (ch === 'I') out.push(dv.getUint32(0, le));
        else if (ch === 'b') out.push(dv.getInt8(0));
        else if (ch === 'h') out.push(dv.getInt16(0, le));
        else if (ch === 'i') out.push(dv.getInt32(0, le));
        else throw new Error("Unknown unpack type");
      }
    }
    return out;
  };

  const ESP_ROM_BAUD = 115200;
  const SYNC_PACKET = toByteArray("\x07\x07\x12 UUUUUUUUUUUUUUUUUUUUUUUUUUUUUUUU");
  const ESP_SYNC = 0x08;
  const ESP_READ_REG = 0x0a;
  const ESP_WRITE_REG = 0x09;
  const ESP_SPI_ATTACH = 0x0d;
  const ESP_FLASH_BEGIN = 0x02;
  const ESP_FLASH_DATA = 0x03;
  const ESP_FLASH_END = 0x04;
  const ESP_CHECKSUM_MAGIC = 0xef;
  const DEFAULT_TIMEOUT = 3000;
  const SYNC_TIMEOUT = 300;
  const ERASE_REGION_TIMEOUT_PER_MB = 30000;
  const FLASH_WRITE_SIZE = 0x400;
  const FLASH_SECTOR_SIZE = 0x1000;
  const CHIP_DETECT_MAGIC_REG_ADDR = 0x40001000;
  const CHIP_FAMILY_ESP8266 = 0x8266;
  const CHIP_FAMILY_ESP32 = 0x32;
  const CHIP_FAMILY_ESP32S2 = 0x3252;
  const CHIP_FAMILY_ESP32S3 = 0x3253;
  const CHIP_FAMILY_ESP32C2 = 0x32c2;
  const CHIP_FAMILY_ESP32C3 = 0x32c3;
  const CHIP_FAMILY_ESP32C6 = 0x32c6;
  const CHIP_FAMILY_ESP32H2 = 0x3272;
  const CHIP_DETECT_MAGIC_VALUES = {
    0xfff0c101: { name: "ESP8266", family: CHIP_FAMILY_ESP8266 },
    0x00f01d83: { name: "ESP32", family: CHIP_FAMILY_ESP32 },
    0x000007c6: { name: "ESP32-S2", family: CHIP_FAMILY_ESP32S2 },
    0x9: { name: "ESP32-S3", family: CHIP_FAMILY_ESP32S3 },
    0xeb004136: { name: "ESP32-S3(beta2)", family: CHIP_FAMILY_ESP32S3 },
    0x6f51306f: { name: "ESP32-C2", family: CHIP_FAMILY_ESP32C2 },
    0x7c41a06f: { name: "ESP32-C2", family: CHIP_FAMILY_ESP32C2 },
    0x6921506f: { name: "ESP32-C3", family: CHIP_FAMILY_ESP32C3 },
    0x1b31506f: { name: "ESP32-C3", family: CHIP_FAMILY_ESP32C3 },
    0xd7b73e80: { name: "ESP32-H2", family: CHIP_FAMILY_ESP32H2 },
    0x0da1806f: { name: "ESP32-C6(beta)", family: CHIP_FAMILY_ESP32C6 },
    0x2ce0806f: { name: "ESP32-C6", family: CHIP_FAMILY_ESP32C6 },
  };

  class ESPLoader {
    constructor(port, logger) {
      this.port = port;
      this.logger = logger;
      this._inputBuffer = [];
      this.chipFamily = null;
      this._reader = null;
      this._writer = null;
    }

    async setSignals(dtr, rts) {
      await this.port.setSignals({ dataTerminalReady: dtr, requestToSend: rts });
    }

    async preciseBootloaderSequence() {
      this.logger.log(">>> BOOT button HOLD (RTS=HIGH → GPIO0 LOW)");
      await this.setSignals(false, true);
      await sleep(100);
      this.logger.log(">>> RESET button PRESS (DTR=HIGH → EN LOW)");
      await this.setSignals(true, true);
      await sleep(100);
      this.logger.log(">>> RESET button RELEASE (DTR=LOW → EN HIGH)");
      await this.setSignals(false, true);
      await sleep(100);
      this.logger.log(">>> BOOT button RELEASE (RTS=LOW → GPIO0 HIGH)");
      await this.setSignals(false, false);
      await sleep(300);
      this.logger.log("Bootloader entry sequence completed, waiting for ESP ROM...");
      await sleep(200);
      this._inputBuffer.length = 0;
    }

    async _readLoop() {
      try {
        while (true) {
          const { value, done } = await this._reader.read();
          if (done) break;
          if (value) this._inputBuffer.push(...Array.from(value));
        }
      } catch(e) {}
    }

    async initStreams() {
      this._inputBuffer = [];
      this._reader = this.port.readable.getReader();
      this._writer = this.port.writable.getWriter();
      this._readLoop();
      await this.setSignals(false, false);
    }

    async sync() {
      this._inputBuffer.length = 0;
      await this.sendCommand(ESP_SYNC, SYNC_PACKET);
      for (let i = 0; i < 10; i++) {
        try {
          let [_, data] = await this.getResponse(ESP_SYNC, SYNC_TIMEOUT);
          if (data.length >= 2 && data[0] === 0 && data[1] === 0) return true;
        } catch(e) {}
        await sleep(80);
      }
      throw new Error("Sync failed after 10 attempts");
    }

    async readRegister(reg) {
      let cmd = pack("<I", reg);
      await this.sendCommand(ESP_READ_REG, cmd);
      let [val, _] = await this.getResponse(ESP_READ_REG);
      return val;
    }

    async sendCommand(opcode, data, checksum = 0) {
      let header = pack("<BBHI", 0x00, opcode, data.length, checksum);
      let packet = slipEncode([...header, ...data]);
      await this._writer.write(new Uint8Array(packet));
    }

    async readPacket(timeout) {
      let start = Date.now();
      while (this._inputBuffer.length === 0) {
        if (Date.now() - start > timeout) throw new Error("Timeout waiting for packet");
        await sleep(5);
      }
      let b = this._inputBuffer.shift();
      while (b !== 0xc0) {
        if (this._inputBuffer.length === 0) {
          if (Date.now() - start > timeout) throw new Error("Timeout waiting for packet start");
          await sleep(5);
          continue;
        }
        b = this._inputBuffer.shift();
      }
      let packet = [], escape = false;
      while (true) {
        if (this._inputBuffer.length === 0) {
          if (Date.now() - start > timeout) throw new Error("Timeout waiting for packet end");
          await sleep(5);
          continue;
        }
        b = this._inputBuffer.shift();
        if (escape) {
          if (b === 0xdc) packet.push(0xc0);
          else if (b === 0xdd) packet.push(0xdb);
          else throw new Error("Invalid SLIP escape");
          escape = false;
        } else if (b === 0xdb) {
          escape = true;
        } else if (b === 0xc0) {
          return new Uint8Array(packet);
        } else {
          packet.push(b);
        }
      }
    }

    async getResponse(expectedOp, timeout = DEFAULT_TIMEOUT) {
      let packet = await this.readPacket(timeout);
      if (packet.length < 8) throw new Error("Response too short");
      let [resp, op, len, val] = unpack("<BBHI", packet.slice(0, 8));
      if (resp !== 1) throw new Error(`Invalid response status ${resp}`);
      if (op !== expectedOp) throw new Error(`Unexpected command response ${toHex(op)} != ${toHex(expectedOp)}`);
      let data = packet.slice(8, 8 + len);
      return [val, data];
    }

    async checkCommand(opcode, data, checksum = 0, timeout = DEFAULT_TIMEOUT) {
      await this.sendCommand(opcode, data, checksum);
      let [val, respData] = await this.getResponse(opcode, timeout);
      let statusLen = (this.chipFamily === CHIP_FAMILY_ESP8266) ? 2 : 4;
      if (respData.length < statusLen) throw new Error("Short status");
      let status = respData.slice(-statusLen);
      if (status[0] === 1) throw new Error(`Command ${toHex(opcode)} failed: error ${toHex(status[1])}`);
      return [val, respData.slice(0, -statusLen)];
    }

    checksum(data, state = ESP_CHECKSUM_MAGIC) {
      for (let b of data) state ^= b;
      return state;
    }

    async detectChip() {
      let magic = await this.readRegister(CHIP_DETECT_MAGIC_REG_ADDR);
      let chip = CHIP_DETECT_MAGIC_VALUES[magic >>> 0];
      if (!chip) throw new Error(`Unknown chip magic ${toHex(magic)}`);
      this.chipFamily = chip.family;
      this.logger.log(`Detected ${chip.name}`);
      if (this.chipFamily !== CHIP_FAMILY_ESP8266) {
        await this.checkCommand(ESP_SPI_ATTACH, new Array(8).fill(0));
      }
    }

    async flashBegin(size, offset) {
      let blockSize = FLASH_WRITE_SIZE;
      let numBlocks = Math.ceil(size / blockSize);
      let eraseSize = (this.chipFamily === CHIP_FAMILY_ESP8266) ? size : ((size + FLASH_SECTOR_SIZE - 1) & ~(FLASH_SECTOR_SIZE - 1));
      let timeout = Math.max(DEFAULT_TIMEOUT, (size / (1024*1024)) * ERASE_REGION_TIMEOUT_PER_MB);
      let buf = pack("<IIII", eraseSize, numBlocks, blockSize, offset);
      await this.checkCommand(ESP_FLASH_BEGIN, buf, 0, timeout);
    }

    async flashBlock(seq, data) {
      let len = data.length;
      let header = pack("<IIII", len, seq, 0, 0);
      let cs = this.checksum(data);
      let packet = [...header, cs, ...data];
      await this.checkCommand(ESP_FLASH_DATA, packet);
    }

    async flashFinish() {
      await this.checkCommand(ESP_FLASH_END, pack("<I", 1));
    }

    async writeFlash(addr, firmware, onProgress) {
      let total = firmware.length;
      await this.flashBegin(total, addr);
      let blockSize = FLASH_WRITE_SIZE;
      let seq = 0;
      for (let pos = 0; pos < total; pos += blockSize) {
        let chunk = firmware.slice(pos, Math.min(pos + blockSize, total));
        if (chunk.length < blockSize) {
          chunk = chunk.concat(new Array(blockSize - chunk.length).fill(0xff));
        }
        await this.flashBlock(seq, chunk);
        seq++;
        let written = Math.min(pos + blockSize, total);
        onProgress({ type: 'progress', bytesWritten: written, totalBytes: total });
      }
      await this.flashFinish();
    }

    async hardReset(bootloader) {
      this.logger.log("Hard reset...");
      if (bootloader) {
        await this.setSignals(true, true);
        await sleep(120);
        await this.setSignals(false, true);
        await sleep(120);
        await this.setSignals(false, false);
        await sleep(120);
      } else {
        await this.setSignals(true, false);
        await sleep(120);
        await this.setSignals(false, false);
        await sleep(120);
      }
      await sleep(300);
    }

    async disconnect() {
      if (this._reader) await this._reader.cancel();
      if (this._writer) await this._writer.close();
      await this.port.close();
    }
  }

  let activePort = null, esploader = null, flashingActive = false, selectedFirmwareData = null, selectedFirmwareName = null;
  const selectPortBtn = document.getElementById('selectPortBtn'), portStatusSpan = document.getElementById('portStatus');
  const flashBtn = document.getElementById('flashActionBtn'), progressFill = document.getElementById('progressFill');
  const progressPercentSpan = document.getElementById('progressPercent'), logContainer = document.getElementById('logTerminal');
  const activeFirmwareDisplay = document.getElementById('activeFirmwareDisplay'), sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay'), menuToggle = document.getElementById('menuToggleBtn');
  const searchInput = document.getElementById('searchFirmware');

  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
  overlay.addEventListener('click', closeSidebar);
  window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

  function addLog(msg, type='info') {
    const div = document.createElement('div'); div.className = 'log-line';
    const prefix = document.createElement('span'); prefix.className = 'log-prefix'; prefix.innerText = '>';
    const text = document.createElement('span'); text.className = 'log-text';
    if (type === 'error') text.style.color = '#ff9e9e';
    if (type === 'success') text.style.fontWeight = '500';
    text.innerText = msg;
    div.appendChild(prefix); div.appendChild(text);
    logContainer.appendChild(div); logContainer.scrollTop = logContainer.scrollHeight;
    while(logContainer.children.length > 200) logContainer.removeChild(logContainer.firstChild);
  }

  function updateProgress(percent) { const p = Math.min(100, Math.max(0, percent)); progressFill.style.width = `${p}%`; progressPercentSpan.innerText = `${Math.floor(p)}%`; }
  function resetProgress() { updateProgress(0); }
  function updateFlashButtonState() { flashBtn.disabled = (flashingActive || !activePort || !selectedFirmwareData); }
  function setControlsEnabled(enabled) { selectPortBtn.disabled = !enabled; updateFlashButtonState(); }
  function updatePortUI() {
    if (activePort) { const info = activePort.getInfo(); const name = info.usbProductName || info.friendlyName || 'ESP32'; portStatusSpan.innerHTML = `<i class="fas fa-link"></i> Connected: ${name}`; }
    else { portStatusSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`; }
  }

  async function closeSerial() { if (esploader) await esploader.disconnect(); if (activePort) { try { await activePort.close(); } catch(e) {} activePort = null; } }

  async function connectToPort() {
    if (flashingActive) { addLog("Flashing in progress", "error"); return; }
    if (!('serial' in navigator)) { addLog("Web Serial API not supported", "error"); return; }
    try {
      if (activePort) await closeSerial();
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      activePort = port;
      const logger = { log: (msg) => addLog(msg, 'info') };
      esploader = new ESPLoader(port, logger);
      await esploader.initStreams();
      updatePortUI(); addLog(`Serial port ready @115200 baud`, "success"); updateFlashButtonState();
    } catch (err) { addLog(`Port error: ${err.message}`, "error"); }
  }

  async function loadFirmware(name, file) {
    addLog(`Loading ${name}...`, "info");
    try {
      const response = await fetch(file);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const buffer = await response.arrayBuffer();
      const data = new Uint8Array(buffer);
      selectedFirmwareData = data; selectedFirmwareName = name;
      activeFirmwareDisplay.innerHTML = `<i class="fas fa-check-circle"></i> Active firmware: <strong>${name}</strong> (${(data.length/1024).toFixed(2)} KB)`;
      addLog(`Firmware ready: ${name} (${data.length} bytes)`, "success");
      document.querySelectorAll('.fw-item').forEach(el => { if (el.getAttribute('data-file') === file) el.classList.add('active'); else el.classList.remove('active'); });
      updateFlashButtonState();
    } catch (e) { addLog(`Failed to load ${name}: ${e.message}`, "error"); selectedFirmwareData = null; activeFirmwareDisplay.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Failed to load ${name}`; flashBtn.disabled = true; }
  }

  async function startFlashing() {
    if (flashingActive) return;
    if (!activePort || !esploader) { addLog("No serial port connected", "error"); return; }
    if (!selectedFirmwareData) { addLog("No firmware selected", "error"); return; }
    flashingActive = true; setControlsEnabled(false); resetProgress();
    addLog(`Starting flash: ${selectedFirmwareName} (${(selectedFirmwareData.length/1024).toFixed(2)} KB)`, "info");
    try {
      await esploader.preciseBootloaderSequence();
      addLog("Synchronizing with ESP32 bootloader...", "info");
      await esploader.sync();
      addLog("Sync OK", "success");
      await esploader.detectChip();
      addLog("Chip detected, SPI attached", "success");
      const writeCallback = (ev) => {
        if (ev.type === 'progress') updateProgress((ev.bytesWritten / ev.totalBytes) * 100);
      };
      addLog("Writing firmware at offset 0x10000...", "info");
      await esploader.writeFlash(0x10000, selectedFirmwareData, writeCallback);
      updateProgress(100);
      addLog("Firmware written successfully!", "success");
      addLog("Rebooting...", "info");
      await esploader.hardReset(false);
      addLog("Device rebooted. Firmware active.", "success");
    } catch (err) { addLog(`Flashing error: ${err.message}`, "error"); }
    finally { flashingActive = false; setControlsEnabled(true); await closeSerial(); updatePortUI(); }
  }

  function filterFirmwares() {
    const term = searchInput.value.toLowerCase();
    document.querySelectorAll('.fw-item').forEach(item => {
      const name = item.getAttribute('data-fw').toLowerCase();
      const desc = item.querySelector('.fw-desc')?.innerText.toLowerCase() || '';
      item.style.display = (name.includes(term) || desc.includes(term)) ? '' : 'none';
    });
  }

  document.querySelectorAll('.fw-item').forEach(item => {
    item.addEventListener('click', async () => {
      if (flashingActive) { addLog("Cannot change firmware while flashing", "error"); return; }
      const name = item.getAttribute('data-fw'), file = item.getAttribute('data-file');
      await loadFirmware(name, file);
      if (window.innerWidth <= 768) closeSidebar();
    });
  });
  searchInput.addEventListener('input', filterFirmwares);
  selectPortBtn.addEventListener('click', connectToPort);
  flashBtn.addEventListener('click', startFlashing);
  if (!('serial' in navigator)) { addLog("Web Serial API unavailable", "error"); selectPortBtn.disabled = true; }
  addLog("WebFlasher ready. Select firmware, connect serial port, then click FLASH.", "info");
})();
</script>
</body>
</html>
