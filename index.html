<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FLASHER</title>
  <link rel="icon" href="Logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }
    body {
      background-color: #000000;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
    }
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      gap: 2rem;
    }
    .splash img {
      width: 120px;
      height: auto;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
    }
    .splash p {
      font-size: 0.9rem;
      color: #cccccc;
      letter-spacing: 1px;
    }
    .splash .loader {
      width: 32px;
      height: 32px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 998;
      display: none;
    }
    .sidebar-overlay.active {
      display: block;
    }
    .app-wrapper {
      display: none;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .sidebar {
      width: 280px;
      background: #050505;
      border-right: 1px solid #1f1f1f;
      padding: 2rem 1rem;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      z-index: 999;
      overflow-y: auto;
    }
    .sidebar h2 {
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: -0.2px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-wrapper {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .search-box {
      flex: 1;
      position: relative;
    }
    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 0.8rem;
    }
    .search-box input {
      width: 100%;
      background: #0b0b0b;
      border: 1px solid #262626;
      padding: 0 0.6rem 0 2rem;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      outline: none;
      height: 38px;
    }
    .search-box input:focus {
      border-color: #ffffff;
    }
    .btn-plus {
      background: #0b0b0b;
      border: 1px solid #262626;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .btn-plus:hover {
      border-color: #ffffff;
      background: #151515;
    }
    .firmware-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .fw-item {
      background: #0b0b0b;
      border: 1px solid #262626;
      padding: 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .fw-item:hover {
      border-color: #4a4a4a;
      background: #0f0f0f;
    }
    .fw-item.active {
      border-left: 3px solid #ffffff;
      background: #111111;
      border-color: #ffffff #262626 #262626 #ffffff;
    }
    .fw-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fw-name i {
      font-size: 0.8rem;
      color: #ffffff;
    }
    .fw-desc {
      font-size: 0.7rem;
      color: #aaaaaa;
      line-height: 1.3;
    }
    .main-content {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow-y: auto;
    }
    .mobile-menu-btn {
      display: none;
      background: transparent;
      border: 1px solid #ffffff;
      width: 42px;
      height: 42px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 1rem;
      color: white;
      font-size: 1.4rem;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 1rem;
      flex-shrink: 0;
    }
    .logo h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .card {
      background: #0a0a0a;
      border: 1px solid #222222;
    }
    .flasher-card {
      background: #0c0c0c;
      padding: 1.5rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-bottom: 0.75rem;
    }
    h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      font-weight: 500;
      flex-shrink: 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      background: transparent;
      border: 1.5px solid #ffffff;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.7rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      letter-spacing: 0.3px;
      background-color: transparent;
      border-radius: 0px;
      align-self: flex-start;
      flex-shrink: 0;
    }
    .btn i {
      font-size: 1rem;
      color: #ffffff;
      transition: color 0.2s;
    }
    .btn:hover {
      background-color: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }
    .btn:hover i {
      color: #000000;
    }
    .port-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      background: #050505;
      padding: 0.8rem;
      border-left: 3px solid #2c2c2c;
      flex-shrink: 0;
    }
    .port-status {
      font-size: 0.75rem;
      font-family: monospace;
      background: #0f0f0f;
      padding: 0.4rem 0.8rem;
      border: 1px solid #2a2a2a;
      color: #dddddd;
      flex: 1;
      word-break: break-all;
    }
    .active-fw-indicator {
      background: #0a0a0a;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
      border-left: 3px solid #ffffff;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .log-terminal {
      background: #030303;
      border: 1px solid #252525;
      padding: 0.8rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      margin-top: 1.5rem;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .log-line {
      padding: 0.2rem 0;
      border-bottom: 1px dotted #1e1e1e;
      display: flex;
      gap: 0.7rem;
    }
    .log-prefix {
      color: #9e9e9e;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
        width: 260px;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        padding: 1rem;
      }
      .header {
        margin-top: 0.5rem;
      }
      .logo h1 {
        font-size: 1.2rem;
      }
      .port-section {
        flex-direction: column;
        align-items: stretch;
      }
      .btn {
        justify-content: center;
        align-self: stretch;
      }
      .flasher-card {
        padding: 1.2rem;
      }
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
    }
  </style>
</head>
<body>
<div class="splash" id="splash">
  <img src="Logo.png" alt="Logo" id="splashLogo">
  <div class="loader"></div>
  <p>Loading libraries...</p>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-wrapper" id="appWrapper">
  <div class="sidebar" id="sidebar">
    <h2><i class="fas fa-microchip"></i> Firmware library</h2>
    <div class="search-wrapper">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchFirmware" placeholder="Search firmware...">
      </div>
      <button id="addCustomFirmwareBtn" class="btn-plus"><i class="fas fa-plus"></i></button>
    </div>
    <div class="firmware-list" id="firmwareListContainer">
      <div class="fw-item" data-fw="NanoDrive" data-file="Lib/NanoDrive/NanoDrive.bin" data-custom="false">
        <div class="fw-name">NanoDrive <i class="fas fa-microchip"></i></div>
        <div class="fw-desc" id="defaultFwDesc">Loading description...</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <button class="mobile-menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
    <div class="header">
      <div class="logo">
        <h1>ESP32-2432S028R WEBFLASHER</h1>
      </div>
    </div>

    <div class="card flasher-card">
      <h3><i class="fas fa-satellite-dish"></i> Flash interface</h3>
      <div class="port-section">
        <button id="selectPortBtn" class="btn"><i class="fas fa-plug"></i> Select port</button>
        <span id="portStatus" class="port-status"><i class="fas fa-circle-notch"></i> No port selected</span>
      </div>

      <div id="activeFirmwareDisplay" class="active-fw-indicator">
        <i class="fas fa-info-circle"></i> No firmware selected
      </div>

      <button id="flashActionBtn" class="btn" disabled><i class="fas fa-bolt"></i> FLASH FIRMWARE</button>

      <div class="log-terminal" id="logTerminal">
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">System ready — waiting for serial connection</span></div>
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">ESP32-2432S028R WebFlasher (esptool-js engine)</span></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="customFirmwareInput" accept=".bin" style="display: none;">

<script type="importmap">
  {
    "imports": {
      "esptool-js": "https://unpkg.com/esptool-js@0.5.4/bundle.js"
    }
  }
</script>

<script type="module">
  import * as esptoolModule from 'esptool-js';
  const { ESPLoader, Transport } = esptoolModule;

  async function preloadResources() {
    await new Promise((resolve) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = "Logo.png";
    });
  }

  await preloadResources();

  const splash = document.getElementById('splash');
  const appWrapper = document.getElementById('appWrapper');
  if (splash) splash.style.display = 'none';
  if (appWrapper) appWrapper.style.display = 'flex';

  let selectedPort = null;
  let flashingInProgress = false;
  let selectedFirmwareData = null;
  let selectedFirmwareName = null;
  let selectedFirmwareFile = null;

  const selectPortBtn = document.getElementById('selectPortBtn');
  const portStatusSpan = document.getElementById('portStatus');
  const flashBtn = document.getElementById('flashActionBtn');
  const logContainer = document.getElementById('logTerminal');
  const activeFirmwareDisplay = document.getElementById('activeFirmwareDisplay');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const menuToggle = document.getElementById('menuToggleBtn');
  const searchInput = document.getElementById('searchFirmware');
  const addCustomBtn = document.getElementById('addCustomFirmwareBtn');
  const customFileInput = document.getElementById('customFirmwareInput');
  const firmwareListContainer = document.getElementById('firmwareListContainer');
  const defaultFwItem = document.querySelector('.fw-item[data-fw="NanoDrive"]');
  const defaultFwDescSpan = document.getElementById('defaultFwDesc');

  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
  overlay.addEventListener('click', closeSidebar);
  window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

  function addLog(msg, type='info') {
    const safeMsg = String(msg === undefined || msg === null ? '' : msg);
    const div = document.createElement('div');
    div.className = 'log-line';
    const prefix = document.createElement('span');
    prefix.className = 'log-prefix';
    prefix.innerText = '>';
    const text = document.createElement('span');
    text.className = 'log-text';
    if (type === 'error') text.style.color = '#ff9e9e';
    if (type === 'success') text.style.fontWeight = '500';
    text.innerText = safeMsg;
    div.appendChild(prefix);
    div.appendChild(text);
    logContainer.appendChild(div);
    logContainer.scrollTop = logContainer.scrollHeight;
    while(logContainer.children.length > 200) logContainer.removeChild(logContainer.firstChild);
  }

  function setControlsEnabled(enabled) {
    selectPortBtn.disabled = !enabled;
    if(enabled && selectedFirmwareData && selectedPort && !flashingInProgress) flashBtn.disabled = false;
    else if(!enabled) flashBtn.disabled = true;
    else if(!selectedFirmwareData || !selectedPort) flashBtn.disabled = true;
  }

  function uint8ToBinaryString(u8) {
    let result = '';
    const chunkSize = 0x8000;
    for (let i = 0; i < u8.length; i += chunkSize) {
      const chunk = u8.subarray(i, i + chunkSize);
      result += String.fromCharCode.apply(null, chunk);
    }
    return result;
  }

  async function selectSerialPort() {
    if (flashingInProgress) { addLog("Flashing in progress, cannot change port", "error"); return; }
    if (!('serial' in navigator)) { addLog("Web Serial API not supported. Use Chrome/Edge.", "error"); return; }
    try {
      const port = await navigator.serial.requestPort();
      selectedPort = port;
      const info = port.getInfo();
      const name = info.usbProductName || info.friendlyName || 'Serial device';
      const vid = info.usbVendorId || '?';
      const pid = info.usbProductId || '?';
      portStatusSpan.innerHTML = `<i class="fas fa-check-circle"></i> Port selected: ${name} (${vid}:${pid})`;
      addLog(`Port selected: ${name}`, "success");
      if (selectedFirmwareData) flashBtn.disabled = false;
      else flashBtn.disabled = true;
    } catch(err) {
      addLog(`Port selection error: ${err.message}`, "error");
      selectedPort = null;
      portStatusSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`;
      flashBtn.disabled = true;
    }
  }

  async function startFlashing() {
    if (flashingInProgress) return;
    if (!selectedPort) { addLog("No serial port selected", "error"); return; }
    if (!selectedFirmwareData) { addLog("No firmware selected", "error"); return; }
    flashingInProgress = true;
    setControlsEnabled(false);
    let transport = null;
    let esptoolInstance = null;
    let success = false;
    try {
      addLog(`Flashing ${selectedFirmwareName} (${(selectedFirmwareData.length/1024).toFixed(2)} KB) ...`, "info");
      transport = new Transport(selectedPort);
      esptoolInstance = new ESPLoader({
        transport: transport,
        baudrate: 115200,
        terminal: {
          clean: () => {},
          writeLine: (msg) => addLog(String(msg !== undefined ? msg : ""), "info"),
          write: (msg) => addLog(String(msg !== undefined ? msg : ""), "info")
        }
      });
      await esptoolInstance.main();
      addLog("Connected to ESP device", "success");
      const flashAddress = 0x10000;
      addLog(`Writing firmware to address 0x${flashAddress.toString(16)}...`, "info");
      const binaryData = uint8ToBinaryString(selectedFirmwareData);
      await esptoolInstance.writeFlash({
        fileArray: [
          {
            data: binaryData,
            address: flashAddress
          }
        ],
        flashSize: "keep",
        eraseAll: false,
        compress: true,
        reportProgress: (sent, total) => {
          const percent = (sent / total) * 100;
          if (Math.floor(percent) % 10 === 0 && percent < 100 && percent > 0) {
            addLog(`Progress ${Math.floor(percent)}%`, "info");
          }
        }
      });
      addLog("Firmware successfully written!", "success");
      try {
        await esptoolInstance.after();
        addLog("Device rebooted", "success");
      } catch (e) {
        addLog("Auto reset not supported, please press RESET button on device", "info");
      }
      success = true;
    } catch(err) {
      addLog(`Flashing error: ${err.message || String(err)}`, "error");
      success = false;
    } finally {
      flashingInProgress = false;
      if (esptoolInstance) {
        try { await esptoolInstance.transport.disconnect(); } catch(e) {}
      }
      setControlsEnabled(true);
      if (success) addLog("Device ready.", "success");
      else addLog("Flashing failed, please retry.", "error");
    }
  }

  async function loadFirmware(name, file, binaryData = null) {
    addLog(`Loading ${name}...`, "info");
    try {
      let data;
      if (binaryData) {
        data = binaryData;
      } else {
        const resp = await fetch(file);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const buf = await resp.arrayBuffer();
        data = new Uint8Array(buf);
      }
      selectedFirmwareData = data;
      selectedFirmwareName = name;
      selectedFirmwareFile = file;
      activeFirmwareDisplay.innerHTML = `<i class="fas fa-check-circle"></i> Active firmware: <strong>${name}</strong> (${(data.length/1024).toFixed(2)} KB)`;
      addLog(`Firmware ready: ${name} (${data.length} bytes)`, "success");
      document.querySelectorAll('.fw-item').forEach(el => {
        if ((el.getAttribute('data-file') === file && !binaryData) || (binaryData && el.getAttribute('data-custom') === 'true' && el.getAttribute('data-fw') === name)) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });
      if (!flashingInProgress && selectedPort) flashBtn.disabled = false;
      else if (!flashingInProgress) flashBtn.disabled = true;
    } catch(e) {
      addLog(`Failed to load ${name}: ${e.message}`, "error");
      if (!binaryData) {
        selectedFirmwareData = null;
        activeFirmwareDisplay.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Failed to load ${name}`;
        flashBtn.disabled = true;
      }
    }
  }

  function addCustomFirmwareToList(name, binaryData, fileObj) {
    const existing = Array.from(firmwareListContainer.querySelectorAll('.fw-item')).find(item => item.getAttribute('data-fw') === name);
    if (existing) {
      existing.click();
      return;
    }
    const fwDiv = document.createElement('div');
    fwDiv.className = 'fw-item';
    fwDiv.setAttribute('data-fw', name);
    fwDiv.setAttribute('data-file', 'custom');
    fwDiv.setAttribute('data-custom', 'true');
    fwDiv.innerHTML = `
      <div class="fw-name">${name} <i class="fas fa-file-upload"></i></div>
      <div class="fw-desc">Custom firmware uploaded by user</div>
    `;
    fwDiv.addEventListener('click', async () => {
      if (flashingInProgress) { addLog("Cannot change firmware while flashing", "error"); return; }
      await loadFirmware(name, 'custom', binaryData);
      if (window.innerWidth <= 768) closeSidebar();
    });
    firmwareListContainer.prepend(fwDiv);
    fwDiv.click();
  }

  function handleCustomFirmware(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const arrayBuffer = e.target.result;
      const uint8Array = new Uint8Array(arrayBuffer);
      const fileName = file.name.replace(/\.bin$/i, '');
      const displayName = `${fileName} (custom)`;
      await addCustomFirmwareToList(displayName, uint8Array, file);
      addLog(`Custom firmware loaded: ${file.name}`, "success");
    };
    reader.onerror = () => {
      addLog("Failed to read custom firmware file", "error");
    };
    reader.readAsArrayBuffer(file);
  }

  addCustomBtn.addEventListener('click', () => {
    if (flashingInProgress) {
      addLog("Cannot load custom firmware while flashing", "error");
      return;
    }
    customFileInput.click();
  });

  customFileInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
      handleCustomFirmware(file);
    }
    customFileInput.value = '';
  });

  function filterFirmwares() {
    const term = searchInput.value.toLowerCase();
    document.querySelectorAll('.fw-item').forEach(item => {
      const name = item.getAttribute('data-fw').toLowerCase();
      item.style.display = name.includes(term) ? '' : 'none';
    });
  }

  async function loadDefaultFirmwareWithDescription() {
    try {
      const descResponse = await fetch('Lib/NanoDrive/desc.txt');
      if (descResponse.ok) {
        const descText = await descResponse.text();
        if (defaultFwDescSpan) defaultFwDescSpan.innerText = descText.trim();
        else if (defaultFwItem) defaultFwItem.querySelector('.fw-desc').innerText = descText.trim();
      } else {
        if (defaultFwDescSpan) defaultFwDescSpan.innerText = 'High-performance firmware for NanoDrive platform';
      }
    } catch (e) {
      if (defaultFwDescSpan) defaultFwDescSpan.innerText = 'Advanced firmware with real-time processing';
    }
    
    if (defaultFwItem && !defaultFwItem.classList.contains('active')) {
      await loadFirmware('NanoDrive', 'Lib/NanoDrive/NanoDrive.bin');
    }
  }

  document.querySelectorAll('.fw-item').forEach(item => {
    item.addEventListener('click', async () => {
      if (flashingInProgress) { addLog("Cannot change firmware while flashing", "error"); return; }
      const name = item.getAttribute('data-fw');
      const file = item.getAttribute('data-file');
      if (item.getAttribute('data-custom') === 'true') {
        return;
      }
      await loadFirmware(name, file);
      if (window.innerWidth <= 768) closeSidebar();
    });
  });

  searchInput.addEventListener('input', filterFirmwares);
  selectPortBtn.addEventListener('click', selectSerialPort);
  flashBtn.addEventListener('click', startFlashing);

  if (!('serial' in navigator)) { addLog("Web Serial API unavailable", "error"); selectPortBtn.disabled = true; }
  
  await loadDefaultFirmwareWithDescription();
  addLog("WebFlasher ready. Select firmware, select serial port, then click FLASH.", "info");
</script>
</body>
</html>
