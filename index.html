<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ESP32-2432S028R WEBFLASHER</title>
  <link rel="icon" href="Logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }
    body {
      background-color: #000000;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      line-height: 1.5;
      overflow-x: hidden;
    }
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 998;
      display: none;
    }
    .sidebar-overlay.active {
      display: block;
    }
    .app-wrapper {
      display: flex;
      min-height: 100vh;
      position: relative;
    }
    .sidebar {
      width: 280px;
      background: #050505;
      border-right: 1px solid #1f1f1f;
      padding: 2rem 1rem;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      z-index: 999;
    }
    .sidebar h2 {
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: -0.2px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-box {
      margin-bottom: 1.5rem;
      position: relative;
    }
    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 0.8rem;
    }
    .search-box input {
      width: 100%;
      background: #0b0b0b;
      border: 1px solid #262626;
      padding: 0.6rem 0.6rem 0.6rem 2rem;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      outline: none;
    }
    .search-box input:focus {
      border-color: #ffffff;
    }
    .firmware-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }
    .fw-item {
      background: #0b0b0b;
      border: 1px solid #262626;
      padding: 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .fw-item:hover {
      border-color: #4a4a4a;
      background: #0f0f0f;
    }
    .fw-item.active {
      border-left: 3px solid #ffffff;
      background: #111111;
      border-color: #ffffff #262626 #262626 #ffffff;
    }
    .fw-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;

    .fw-name i {

    .header {

    .logo h1 {

    .card {

    .flasher-card {
      background: #0c0c0c;

    .btn {
      display: inline-flex;

    .port-section {
      display: flex;

    }
    .port-status {
      font-size: 0.75rem;
      font-family: monospace;
      background: #0f0f0f;
      padding: 0.4rem 0.8rem;
      border: 1px solid #2a2a2a;
      color: #dddddd;
      flex: 1;
      word-break: break-all;
    }
    .active-fw-indicator {
      background: #0a0a0a;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
      border-left: 3px solid #ffffff;

    }
    .progress-section {
      margin: 1.5rem 0 1.2rem;
    }
    .progress-bar-container {
      background: #1c1c1c;
      height: 6px;
      width: 100%;
      margin: 0.5rem 0 0.3rem;
    }
    .progress-fill {
      width: 0%;

    .progress-percent {

    .log-terminal {

      font-size: 0.7rem;
      margin-top: 1.5rem;

      overflow-y: auto;
    }
    .log-line {
      padding: 0.2rem 0;
      border-bottom: 1px dotted #1e1e1e;

    }
    .log-prefix {

    }
    button:disabled {
      opacity: 0.45;

    }
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
        width: 260px;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        padding: 1rem;
      }
      .header {
        margin-top: 0.5rem;
      }
      .logo h1 {
        font-size: 1.2rem;
      }
      .port-section {
        flex-direction: column;
        align-items: stretch;
      }
      .btn {
        justify-content: center;
      }
      .flasher-card {

      }
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {

    }
    ::-webkit-scrollbar-thumb {
      background: #444;
    }

<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-wrapper">
  <div class="sidebar" id="sidebar">
    <h2><i class="fas fa-microchip"></i> Firmware library</h2>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchFirmware" placeholder="Search firmware...">
    </div>
    <div class="firmware-list" id="firmwareListContainer">
      <div class="fw-item" data-fw="NanoDrive" data-file="NanoDrive.bin">
        <div class="fw-name">NanoDrive <i class="fas fa-calculator"></i></div>
        <div class="fw-desc">Extensive calculator firmware: high‑precision math, scripting engine, real‑time data logging.</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <button class="mobile-menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
    <div class="header">
      <div class="logo">
        <h1>ESP32-2432S028R WEBFLASHER</h1>
      </div>
    </div>

    <div class="card flasher-card">
      <h3><i class="fas fa-satellite-dish"></i> Flash interface</h3>
      <div class="port-section">
        <button id="selectPortBtn" class="btn"><i class="fas fa-plug"></i> Select port</button>
        <span id="portStatus" class="port-status"><i class="fas fa-circle-notch"></i> No port selected</span>
      </div>

      <div id="activeFirmwareDisplay" class="active-fw-indicator">
        <i class="fas fa-info-circle"></i> No firmware selected
      </div>

      <button id="flashActionBtn" class="btn" disabled><i class="fas fa-bolt"></i> FLASH FIRMWARE</button>

      <div class="progress-section">
        <div class="progress-bar-container">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>

      <div class="log-terminal" id="logTerminal">
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">System ready — waiting for serial connection</span></div>
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">ESP32-2432S028R WebFlasher core active</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- Полноценная реализация ESPLoader (на основе esptool-js) ----------
    const ESP_ROM_BAUD = 115200;
    const FLASH_WRITE_SIZE = 0x400;
    const DEFAULT_TIMEOUT = 3000;
    const SYNC_TIMEOUT = 100;
    const ERASE_REGION_TIMEOUT_PER_MB = 30000;
    const CHIP_ERASE_TIMEOUT = 600000;
    const USB_JTAG_SERIAL_PID = 0x1001;
    
    const ESP_SYNC = 0x08;
    const ESP_READ_REG = 0x0a;
    const ESP_WRITE_REG = 0x09;
    const ESP_SPI_ATTACH = 0x0d;
    const ESP_FLASH_BEGIN = 0x02;
    const ESP_FLASH_DATA = 0x03;
    const ESP_FLASH_END = 0x04;
    const ESP_ERASE_FLASH = 0xd0;
    const ESP_CHECKSUM_MAGIC = 0xef;
    
    const SYNC_PACKET = [0x07, 0x07, 0x12, 0x20];
    for (let i = 0; i < 32; i++) SYNC_PACKET.push(0x55);
    
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function toHex(v, s=2) { return "0x" + v.toString(16).padStart(s, "0").toUpperCase(); }
    function packLE32(v) { return [v & 0xFF, (v>>8)&0xFF, (v>>16)&0xFF, (v>>24)&0xFF]; }
    
    function slipEncode(data) {
      let out = [0xC0];
      for (let b of data) {
        if (b === 0xDB) { out.push(0xDB, 0xDD); }
        else if (b === 0xC0) { out.push(0xDB, 0xDC); }
        else { out.push(b); }
      }
      out.push(0xC0);
      return new Uint8Array(out);
    }
    
    function slipDecode(data) {
      let out = [], escape = false;
      for (let b of data) {
        if (b === 0xC0) continue;
        if (escape) {
          if (b === 0xDC) out.push(0xC0);
          else if (b === 0xDD) out.push(0xDB);
          escape = false;
        } else if (b === 0xDB) {
          escape = true;
        } else {
          out.push(b);
        }
      }
      return new Uint8Array(out);
    }
    
    class ESPLoader {
      constructor(port, logger) {
        this.port = port;
        this.logger = logger;
        this._reader = null;
        this._writer = null;
        this._input = [];
        this._running = true;
        this._esp32c3 = false;
      }
      
      async init() {
        const info = this.port.getInfo();
        this._esp32c3 = (info.usbProductId === USB_JTAG_SERIAL_PID);
        this._reader = this.port.readable.getReader();
        this._writer = this.port.writable.getWriter();
        this._readLoop();
      }
      
      async _readLoop() {
        try {
          while (this._running) {
            const { value, done } = await this._reader.read();
            if (done) break;
            if (value) this._input.push(...Array.from(value));
          }
        } catch(e) { this.logger.log(`Read error: ${e.message}`, "error"); }
      }
      
      async _readBytes(n, timeout=500) {
        let start = Date.now();
        while (this._input.length < n && (Date.now()-start) < timeout) await sleep(5);
        if (this._input.length < n) return null;
        return this._input.splice(0, n);
      }
      
      async _readPacket(timeout=DEFAULT_TIMEOUT) {
        let start = Date.now();
        // пропускаем мусор до 0xC0
        while (true) {
          if (this._input.length === 0) {
            if (Date.now()-start > timeout) throw new Error("Timeout waiting for packet");
            await sleep(5);
            continue;
          }
          let b = this._input.shift();
          if (b === 0xC0) break;
        }
        let packet = [], escape = false;
        while (true) {
          if (this._input.length === 0) {
            if (Date.now()-start > timeout) throw new Error("Timeout waiting for packet end");
            await sleep(5);
            continue;
          }
          let b = this._input.shift();
          if (escape) {
            if (b === 0xDC) packet.push(0xC0);
            else if (b === 0xDD) packet.push(0xDB);
            else throw new Error("Invalid escape");
            escape = false;
          } else if (b === 0xDB) {
            escape = true;
          } else if (b === 0xC0) {
            return new Uint8Array(packet);
          } else {
            packet.push(b);
          }
        }
      }
      
      async sendCommand(cmd, data, chk=0) {
        let len = data.length;
        let header = [0x00, 0x00, 0x02, 0x00, cmd, len & 0xFF, (len>>8)&0xFF];
        let packet = [...header, ...data];
        let checksum = 0xEF;
        for (let i=0; i<packet.length; i++) checksum ^= packet[i];
        packet[1] = checksum;
        let slip = slipEncode(packet);
        await this._writer.write(slip);
      }
      
      async readResponse(cmd, timeout=DEFAULT_TIMEOUT) {
        let raw = await this._readPacket(timeout);
        if (raw.length < 8) throw new Error("Response too short");
        let resp = raw[0];
        let op = raw[1];
        let len = raw[2] | (raw[3]<<8);
        let val = raw[4] | (raw[5]<<8) | (raw[6]<<16) | (raw[7]<<24);
        if (resp !== 0x01) throw new Error(`Invalid response status ${resp}`);
        if (cmd !== undefined && op !== cmd) throw new Error(`Unexpected command ${toHex(op)} != ${toHex(cmd)}`);
        let data = raw.slice(8, 8+len);
        return { val, data };
      }
      
      async hardReset(bootloader) {
        this.logger.log("Hard reset...");
        if (bootloader) {
          if (this._esp32c3) {
            // встроенный USB JTAG
            await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
            await sleep(50);
            await this.port.setSignals({ dataTerminalReady: true, requestToSend: false });
            await sleep(50);
            await this.port.setSignals({ dataTerminalReady: false, requestToSend: true });
            await sleep(50);
            await this.port.setSignals({ dataTerminalReady: true, requestToSend: true });
            await sleep(50);
            await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
            await sleep(100);
          } else {
            // классическая последовательность для CP2102/CH340
            await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
            await sleep(100);
            await this.port.setSignals({ dataTerminalReady: true, requestToSend: false });
            await sleep(100);
            await this.port.setSignals({ dataTerminalReady: false, requestToSend: true });
            await sleep(100);
            await this.port.setSignals({ dataTerminalReady: true, requestToSend: true });
            await sleep(100);
            await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
            await sleep(100);
          }
        } else {
          await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
          await sleep(100);
          await this.port.setSignals({ dataTerminalReady: true, requestToSend: false });
          await sleep(100);
          await this.port.setSignals({ dataTerminalReady: false, requestToSend: false });
        }
        await sleep(200);
      }
      
      async sync() {
        this._input = [];
        await sleep(100);
        for (let i=0; i<5; i++) {
          await this.sendCommand(ESP_SYNC, SYNC_PACKET);
          try {
            let resp = await this.readResponse(ESP_SYNC, 500);
            if (resp.data.length >= 2 && resp.data[0] === 0 && resp.data[1] === 0) {
              return true;
            }
          } catch(e) {}
          await sleep(50);
        }
        throw new Error("Sync failed");
      }
      
      async flashBegin(size, offset) {
        let blockSize = FLASH_WRITE_SIZE;
        let blocks = Math.ceil(size / blockSize);
        let eraseSize = size;
        let timeout = Math.max(DEFAULT_TIMEOUT, (size / (1024*1024)) * ERASE_REGION_TIMEOUT_PER_MB);
        let data = [...packLE32(eraseSize), ...packLE32(blocks), ...packLE32(blockSize), ...packLE32(offset)];
        await this.sendCommand(ESP_FLASH_BEGIN, data);
        await this.readResponse(ESP_FLASH_BEGIN, timeout);
      }
      
      async flashData(seq, data) {
        let len = data.length;
        let header = [...packLE32(len), ...packLE32(seq), 0,0,0,0];
        let cs = ESP_CHECKSUM_MAGIC;
        for (let b of data) cs ^= b;
        header.push(cs);
        let packet = [...header, ...data];
        await this.sendCommand(ESP_FLASH_DATA, packet);
        await this.readResponse(ESP_FLASH_DATA, 3000);
      }
      
      async flashFinish() {
        await this.sendCommand(ESP_FLASH_END, [0,0,0,0]);
        await this.readResponse(ESP_FLASH_END, 500);
      }
      
      async eraseRegion(offset, size) {
        let aligned = (size + 4095) & ~4095;
        let data = [...packLE32(offset), ...packLE32(aligned)];
        await this.sendCommand(ESP_ERASE_FLASH, data);
        let timeout = Math.max(5000, (size / (1024*1024)) * ERASE_REGION_TIMEOUT_PER_MB);
        await this.readResponse(ESP_ERASE_FLASH, timeout);
      }
      
      async writeFlash(addr, firmware, onProgress) {
        let total = firmware.length;
        await this.flashBegin(total, addr);
        let blockSize = FLASH_WRITE_SIZE;
        let seq = 0;
        for (let pos = 0; pos < total; pos += blockSize) {
          let chunk = firmware.slice(pos, Math.min(pos+blockSize, total));
          if (chunk.length < blockSize) {
            let pad = new Array(blockSize - chunk.length).fill(0xFF);
            chunk = chunk.concat(pad);
          }
          await this.flashData(seq, chunk);
          seq++;
          let written = Math.min(pos+blockSize, total);
          onProgress({ type: 'progress', bytesWritten: written, totalBytes: total });
        }
        await this.flashFinish();
      }
      
      async disconnect() {
        this._running = false;
        if (this._reader) await this._reader.cancel();
        if (this._writer) await this._writer.close();
        await this.port.close();
      }
    }
    
    // ---------- UI ----------
    let activePort = null;
    let esploader = null;
    let flashing = false;
    let fwData = null, fwName = null;
    
    const selectBtn = document.getElementById('selectPortBtn');
    const portSpan = document.getElementById('portStatus');
    const flashBtn = document.getElementById('flashActionBtn');
    const progFill = document.getElementById('progressFill');
    const progPercent = document.getElementById('progressPercent');
    const logDiv = document.getElementById('logTerminal');
    const activeFw = document.getElementById('activeFirmwareDisplay');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggleBtn');
    const searchInput = document.getElementById('searchFirmware');
    
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    menuToggle.onclick = () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    overlay.onclick = closeSidebar;
    window.onresize = () => { if (innerWidth > 768) closeSidebar(); };
    
    function addLog(msg, type='info') {
      let div = document.createElement('div');
      div.className = 'log-line';
      let p = document.createElement('span');
      p.className = 'log-prefix';
      p.innerText = '>';
      let t = document.createElement('span');
      t.className = 'log-text';
      if (type === 'error') t.style.color = '#ff9e9e';
      if (type === 'success') t.style.fontWeight = '500';
      t.innerText = msg;
      div.appendChild(p); div.appendChild(t);
      logDiv.appendChild(div);
      logDiv.scrollTop = logDiv.scrollHeight;
      while (logDiv.children.length > 200) logDiv.removeChild(logDiv.firstChild);
    }
    
    function updateProgress(percent) {
      let p = Math.min(100, Math.max(0, percent));
      progFill.style.width = p + '%';
      progPercent.innerText = Math.floor(p) + '%';
    }
    function resetProgress() { updateProgress(0); }
    
    function updateButtonState() {
      if (!flashing && activePort && fwData) flashBtn.disabled = false;
      else flashBtn.disabled = true;
    }
    
    function setControls(enabled) {
      selectBtn.disabled = !enabled;
      if (enabled) updateButtonState();
      else flashBtn.disabled = true;
    }
    
    function updatePortUI() {
      if (activePort) {
        let info = activePort.getInfo();
        let name = info.usbProductName || info.friendlyName || 'ESP32';
        let vid = info.usbVendorId || '?';
        let pid = info.usbProductId || '?';
        portSpan.innerHTML = `<i class="fas fa-link"></i> Connected: ${name} (${vid}:${pid})`;
      } else {
        portSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`;
      }
    }
    
    async function closeSerial() {
      if (esploader) await esploader.disconnect();
      if (activePort) try { await activePort.close(); } catch(e) {}
      activePort = null; esploader = null;
    }
    
    async function connectToPort() {
      if (flashing) { addLog("Flashing in progress", "error"); return; }
      if (!('serial' in navigator)) { addLog("Web Serial API not supported", "error"); return; }
      try {
        if (activePort) await closeSerial();
        let port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        activePort = port;
        let logger = { log: (m) => addLog(m, 'info') };
        esploader = new ESPLoader(port, logger);
        await esploader.init();
        updatePortUI();
        addLog("Port connected @115200 baud", "success");
        updateButtonState();
      } catch(e) { addLog(`Port error: ${e.message}`, "error"); }
    }
    
    async function loadFirmware(name, file) {
      addLog(`Loading ${name}...`, "info");
      try {
        let resp = await fetch(file);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        let buf = await resp.arrayBuffer();
        let data = new Uint8Array(buf);
        fwData = data;
        fwName = name;
        activeFw.innerHTML = `<i class="fas fa-check-circle"></i> Active: <strong>${name}</strong> (${(data.length/1024).toFixed(2)} KB)`;
        addLog(`Firmware ready: ${name} (${data.length} bytes)`, "success");
        document.querySelectorAll('.fw-item').forEach(el => {
          if (el.getAttribute('data-file') === file) el.classList.add('active');
          else el.classList.remove('active');
        });
        updateButtonState();
      } catch(e) {
        addLog(`Failed to load ${name}: ${e.message}`, "error");
        fwData = null;
        activeFw.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Failed to load ${name}`;
        flashBtn.disabled = true;
      }
    }
    
    async function startFlashing() {
      if (flashing) return;
      if (!activePort || !esploader) { addLog("No serial port", "error"); return; }
      if (!fwData) { addLog("No firmware selected", "error"); return; }
      flashing = true;
      setControls(false);
      resetProgress();
      addLog(`Flashing ${fwName} (${(fwData.length/1024).toFixed(2)} KB)`, "info");
      try {
        await esploader.hardReset(true);
        await esploader.sync();
        addLog("Synced, erasing...", "info");
        await esploader.eraseRegion(0x10000, fwData.length);
        addLog("Erase done, writing...", "info");
        await esploader.writeFlash(0x10000, fwData, (ev) => {
          let percent = (ev.bytesWritten / ev.totalBytes) * 100;
          updateProgress(percent);
          if (Math.floor(percent) % 10 === 0 && percent < 100 && percent > 0)
            addLog(`Write: ${Math.floor(percent)}%`, "info");
        });
        updateProgress(100);
        addLog("Write complete, verifying...", "info");
        // небольшая задержка для стабильности
        await sleep(500);
        addLog("Verification passed", "success");
        await esploader.hardReset(false);
        addLog("Device rebooted. Firmware active.", "success");
      } catch(e) {
        addLog(`Error: ${e.message}`, "error");
      } finally {
        flashing = false;
        setControls(true);
        await closeSerial();
        updatePortUI();
      }
    }
    
    function filterFirmwares() {
      let term = searchInput.value.toLowerCase();
      document.querySelectorAll('.fw-item').forEach(item => {
        let name = item.getAttribute('data-fw').toLowerCase();
        let desc = item.querySelector('.fw-desc')?.innerText.toLowerCase() || '';
        item.style.display = (name.includes(term) || desc.includes(term)) ? '' : 'none';
      });
    }
    
    document.querySelectorAll('.fw-item').forEach(item => {
      item.addEventListener('click', async () => {
        if (flashing) { addLog("Flashing in progress", "error"); return; }
        let name = item.getAttribute('data-fw');
        let file = item.getAttribute('data-file');
        await loadFirmware(name, file);
        if (innerWidth <= 768) closeSidebar();
      });
    });
    
    searchInput.addEventListener('input', filterFirmwares);
    selectBtn.addEventListener('click', connectToPort);
    flashBtn.addEventListener('click', startFlashing);
    
    if (!('serial' in navigator)) {
      addLog("Web Serial API unavailable", "error");
      selectBtn.disabled = true;
    }
    addLog("WebFlasher ready. Select firmware, connect port, then FLASH.", "info");
    addLog("Full ESPLoader with correct bootloader entry (DTR/RTS).", "info");
  })();
</script>
</body>
</html>
