    function addLog(msg, type='info') {

    function updateProgress(percent) {

    function updatePortUI() {

        const vid = info.usbVendorId || '?';
        const pid = info.usbProductId || '?';
        portStatusSpan.innerHTML = `<i class="fas fa-link"></i> Connected: ${name} (${vid}:${pid})`;

        portStatusSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`;
      }
    }

    async function closeSerial() {
      if (esploader) {
        await esploader.disconnect();
        esploader = null;
      }
      if (activePort) {
        try { await activePort.close(); } catch(e) {}
        activePort = null;
      }

    async function connectToPort() {

      try {
        if (activePort) await closeSerial();
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const logger = {
          log: (msg) => addLog(msg, 'info'),
          debug: (msg) => console.debug(msg),

        updatePortUI();
        addLog(`Port connected @115200 baud`, "success");
        updateFlashButtonState();
      } catch (err) {
        addLog(`Port error: ${err.message}`, "error");
      }
    }

    async function loadFirmware(name, file) {
      addLog(`Loading ${name}...`, "info");
      try {
        const response = await fetch(file);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const buffer = await response.arrayBuffer();
        const data = new Uint8Array(buffer);
        selectedFirmwareData = data;
        selectedFirmwareName = name;
        selectedFirmwareFile = file;
        activeFirmwareDisplay.innerHTML = `<i class="fas fa-check-circle"></i> Active firmware: <strong>${name}</strong> (${(data.length/1024).toFixed(2)} KB)`;

        document.querySelectorAll('.fw-item').forEach(el => {
          if (el.getAttribute('data-file') === file) el.classList.add('active');
          else el.classList.remove('active');

        addLog(`Failed to load ${name}: ${e.message}`, "error");
        selectedFirmwareData = null;
        activeFirmwareDisplay.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Failed to load ${name}`;
        flashBtn.disabled = true;
      }

      if (!activePort || !esploader) {

        return;
      }
      if (!selectedFirmwareData) {
        addLog("No firmware selected. Please choose from library.", "error");
        return;
      }

      flashingActive = true;
      setControlsEnabled(false);
      resetProgress();
      addLog(`Starting flash: ${selectedFirmwareName} (${(selectedFirmwareData.length/1024).toFixed(2)} KB)`, "info");

        await esploader.hardReset(true);

        item.style.display = (name.includes(term) || desc.includes(term)) ? '' : 'none';

    }

    document.querySelectorAll('.fw-item').forEach(item => {

        const name = item.getAttribute('data-fw');
        const file = item.getAttribute('data-file');
        await loadFirmware(name, file);
        if (window.innerWidth <= 768) closeSidebar();
      });
    });

      addLog("Web Serial API unavailable", "error");
      selectPortBtn.disabled = true;
    }
    addLog("WebFlasher ready. Select firmware, connect serial port, then click FLASH.", "info");
    addLog("Using full ESPLoader implementation (no external imports).", "info");
  })();
</script>
