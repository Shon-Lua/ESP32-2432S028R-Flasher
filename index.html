<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ESP32-2432S028R WEBFLASHER</title>
  <link rel="icon" href="Logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script type="importmap">
    {
      "imports": {
        "esptool-js": "https://cdn.jsdelivr.net/npm/esptool-js@0.5.3/lib/index.js",
        "pako": "https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.esm.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }
    body {
      background-color: #000000;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      line-height: 1.5;
      overflow-x: hidden;
    }
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 998;
      display: none;
    }
    .sidebar-overlay.active {
      display: block;
    }
    .app-wrapper {
      display: flex;
      min-height: 100vh;
      position: relative;
    }
    .sidebar {
      width: 280px;
      background: #050505;
      border-right: 1px solid #1f1f1f;
      padding: 2rem 1rem;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      z-index: 999;
    }
    .sidebar h2 {
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: -0.2px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-box {
      margin-bottom: 1.5rem;
      position: relative;
    }
    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 0.8rem;
    }
    .search-box input {
      width: 100%;
      background: #0b0b0b;
      border: 1px solid #262626;
      padding: 0.6rem 0.6rem 0.6rem 2rem;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      outline: none;
    }
    .search-box input:focus {
      border-color: #ffffff;
    }
    .firmware-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }
    .fw-item {
      background: #0b0b0b;
      border: 1px solid #262626;
      padding: 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .fw-item:hover {
      border-color: #4a4a4a;
      background: #0f0f0f;
    }
    .fw-item.active {
      border-left: 3px solid #ffffff;
      background: #111111;
      border-color: #ffffff #262626 #262626 #ffffff;
    }
    .fw-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fw-name i {
      font-size: 0.8rem;
      color: #ffffff;
    }
    .fw-desc {
      font-size: 0.7rem;
      color: #aaaaaa;
      line-height: 1.3;
    }
    .main-content {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .mobile-menu-btn {
      display: none;
      background: transparent;
      border: 1px solid #ffffff;
      width: 42px;
      height: 42px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 1rem;
      color: white;
      font-size: 1.4rem;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 1rem;
    }
    .logo h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .card {
      background: #0a0a0a;
      border: 1px solid #222222;
    }
    .flasher-card {
      background: #0c0c0c;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
    }
    h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      background: transparent;
      border: 1.5px solid #ffffff;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.7rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      letter-spacing: 0.3px;
      background-color: transparent;
      border-radius: 0px;
    }
    .btn i {
      font-size: 1rem;
      color: #ffffff;
      transition: color 0.2s;
    }
    .btn:hover {
      background-color: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }
    .btn:hover i {
      color: #000000;
    }
    .port-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      background: #050505;
      padding: 0.8rem;
      border-left: 3px solid #2c2c2c;
    }
    .port-status {
      font-size: 0.75rem;
      font-family: monospace;
      background: #0f0f0f;
      padding: 0.4rem 0.8rem;
      border: 1px solid #2a2a2a;
      color: #dddddd;
      flex: 1;
      word-break: break-all;
    }
    .active-fw-indicator {
      background: #0a0a0a;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
      border-left: 3px solid #ffffff;
      font-size: 0.75rem;
    }
    .progress-section {
      margin: 1.5rem 0 1.2rem;
    }
    .progress-bar-container {
      background: #1c1c1c;
      height: 6px;
      width: 100%;
      margin: 0.5rem 0 0.3rem;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background-color: #ffffff;
      transition: width 0.25s ease-out;
    }
    .progress-percent {
      text-align: right;
      font-size: 0.7rem;
      font-weight: 500;
      color: #bbbbbb;
    }
    .log-terminal {
      background: #030303;
      border: 1px solid #252525;
      padding: 0.8rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      margin-top: 1.5rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-line {
      padding: 0.2rem 0;
      border-bottom: 1px dotted #1e1e1e;
      display: flex;
      gap: 0.7rem;
    }
    .log-prefix {
      color: #9e9e9e;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
        width: 260px;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        padding: 1rem;
      }
      .header {
        margin-top: 0.5rem;
      }
      .logo h1 {
        font-size: 1.2rem;
      }
      .port-section {
        flex-direction: column;
        align-items: stretch;
      }
      .btn {
        justify-content: center;
      }
      .flasher-card {
        padding: 1.2rem;
      }
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-wrapper">
  <div class="sidebar" id="sidebar">
    <h2><i class="fas fa-microchip"></i> Firmware library</h2>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchFirmware" placeholder="Search firmware...">
    </div>
    <div class="firmware-list" id="firmwareListContainer">
      <div class="fw-item" data-fw="NanoDrive" data-file="NanoDrive.bin">
        <div class="fw-name">NanoDrive <i class="fas fa-calculator"></i></div>
        <div class="fw-desc">Extensive calculator firmware: high‑precision math, scripting engine, real‑time data logging.</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <button class="mobile-menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
    <div class="header">
      <div class="logo">
        <h1>ESP32-2432S028R WEBFLASHER</h1>
      </div>
    </div>

    <div class="card flasher-card">
      <h3><i class="fas fa-satellite-dish"></i> Flash interface</h3>
      <div class="port-section">
        <button id="selectPortBtn" class="btn"><i class="fas fa-plug"></i> Select port</button>
        <span id="portStatus" class="port-status"><i class="fas fa-circle-notch"></i> No port selected</span>
      </div>

      <div id="activeFirmwareDisplay" class="active-fw-indicator">
        <i class="fas fa-info-circle"></i> No firmware selected
      </div>

      <button id="flashActionBtn" class="btn" disabled><i class="fas fa-bolt"></i> FLASH FIRMWARE</button>

      <div class="progress-section">
        <div class="progress-bar-container">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>

      <div class="log-terminal" id="logTerminal">
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">System ready — waiting for serial connection</span></div>
        <div class="log-line"><span class="log-prefix">></span><span class="log-text">ESP32-2432S028R WebFlasher core active</span></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { ESPLoader, Transport } from 'esptool-js';

  let activePort = null;
  let transport = null;
  let esploader = null;
  let flashingActive = false;
  let selectedFirmwareData = null;
  let selectedFirmwareName = null;
  let selectedFirmwareFile = null;

  const selectPortBtn = document.getElementById('selectPortBtn');
  const portStatusSpan = document.getElementById('portStatus');
  const flashBtn = document.getElementById('flashActionBtn');
  const progressFill = document.getElementById('progressFill');
  const progressPercentSpan = document.getElementById('progressPercent');
  const logContainer = document.getElementById('logTerminal');
  const activeFirmwareDisplay = document.getElementById('activeFirmwareDisplay');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const menuToggle = document.getElementById('menuToggleBtn');
  const searchInput = document.getElementById('searchFirmware');

  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
  overlay.addEventListener('click', closeSidebar);
  window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

  function addLog(msg, type = 'info') {
    const div = document.createElement('div');
    div.className = 'log-line';
    const prefix = document.createElement('span');
    prefix.className = 'log-prefix';
    prefix.innerText = '>';
    const text = document.createElement('span');
    text.className = 'log-text';
    if (type === 'error') text.style.color = '#ff9e9e';
    if (type === 'success') text.style.fontWeight = '500';
    text.innerText = msg;
    div.appendChild(prefix);
    div.appendChild(text);
    logContainer.appendChild(div);
    logContainer.scrollTop = logContainer.scrollHeight;
    while (logContainer.children.length > 200) logContainer.removeChild(logContainer.firstChild);
  }

  function updateProgress(percent) {
    const p = Math.min(100, Math.max(0, percent));
    progressFill.style.width = `${p}%`;
    progressPercentSpan.innerText = `${Math.floor(p)}%`;
  }

  function resetProgress() { updateProgress(0); }

  function updateFlashButtonState() {
    if (!flashingActive && activePort && selectedFirmwareData) {
      flashBtn.disabled = false;
    } else {
      flashBtn.disabled = true;
    }
  }

  function setControlsEnabled(enabled) {
    selectPortBtn.disabled = !enabled;
    if (enabled) updateFlashButtonState();
    else flashBtn.disabled = true;
  }

  function updatePortUI() {
    if (activePort) {
      const info = activePort.getInfo();
      const name = info.usbProductName || info.friendlyName || 'ESP32';
      const vid = info.usbVendorId || '?';
      const pid = info.usbProductId || '?';
      portStatusSpan.innerHTML = `<i class="fas fa-link"></i> Connected: ${name} (${vid}:${pid})`;
    } else {
      portStatusSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`;
    }
  }

  async function closeSerial() {
    if (transport) {
      await transport.disconnect();
      transport = null;
    }
    if (activePort) {
      try { await activePort.close(); } catch(e) {}
      activePort = null;
    }
    esploader = null;
  }

  async function connectToPort() {
    if (flashingActive) { addLog("Flashing in progress, wait", "error"); return; }
    if (!('serial' in navigator)) { addLog("Web Serial API not supported. Use Chrome/Edge.", "error"); return; }
    try {
      if (activePort) await closeSerial();
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      activePort = port;
      transport = new Transport(port);
      esploader = new ESPLoader(transport);
      updatePortUI();
      addLog(`Port connected @115200 baud`, "success");
      updateFlashButtonState();
    } catch (err) {
      addLog(`Port error: ${err.message}`, "error");
    }
  }

  async function loadFirmware(name, file) {
    addLog(`Loading ${name}...`, "info");
    try {
      const response = await fetch(file);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const buffer = await response.arrayBuffer();
      const data = new Uint8Array(buffer);
      selectedFirmwareData = data;
      selectedFirmwareName = name;
      selectedFirmwareFile = file;
      activeFirmwareDisplay.innerHTML = `<i class="fas fa-check-circle"></i> Active firmware: <strong>${name}</strong> (${(data.length/1024).toFixed(2)} KB)`;
      addLog(`Firmware ready: ${name} (${data.length} bytes)`, "success");
      document.querySelectorAll('.fw-item').forEach(el => {
        if (el.getAttribute('data-file') === file) el.classList.add('active');
        else el.classList.remove('active');
      });
      updateFlashButtonState();
    } catch (e) {
      addLog(`Failed to load ${name}: ${e.message}`, "error");
      selectedFirmwareData = null;
      activeFirmwareDisplay.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Failed to load ${name}`;
      flashBtn.disabled = true;
    }
  }

  async function startFlashing() {
    if (flashingActive) return;
    if (!activePort || !transport || !esploader) {
      addLog("No serial port connected. Please select port first.", "error");
      return;
    }
    if (!selectedFirmwareData) {
      addLog("No firmware selected. Please choose from library.", "error");
      return;
    }

    flashingActive = true;
    setControlsEnabled(false);
    resetProgress();
    addLog(`Starting flash: ${selectedFirmwareName} (${(selectedFirmwareData.length/1024).toFixed(2)} KB)`, "info");

    try {
      await esploader.main();
      addLog("Connected to ESP32 in download mode", "success");

      const writeCallback = (event) => {
        if (event.type === 'progress') {
          const percent = (event.bytesWritten / event.totalBytes) * 100;
          updateProgress(percent);
          if (Math.floor(percent) % 10 === 0 && percent < 100 && percent > 0) {
            addLog(`Write progress: ${Math.floor(percent)}%`, "info");
          }
        }
      };

      addLog("Erasing flash region (0x10000)...", "info");
      await esploader.eraseRegion(0x10000, selectedFirmwareData.length);
      addLog("Erase completed", "success");

      addLog("Writing firmware to address 0x10000...", "info");
      await esploader.writeFlash(0x10000, selectedFirmwareData, writeCallback);
      updateProgress(100);
      addLog("Firmware written successfully!", "success");

      addLog("Verifying firmware...", "info");
      await esploader.verifyFlash(0x10000, selectedFirmwareData);
      addLog("Verification passed", "success");

      addLog("Rebooting device...", "info");
      await esploader.hardReset();
      addLog("Device rebooted. Firmware is now active.", "success");
    } catch (err) {
      addLog(`Flashing error: ${err.message}`, "error");
    } finally {
      flashingActive = false;
      setControlsEnabled(true);
      await closeSerial();
      updatePortUI();
    }
  }

  function filterFirmwares() {
    const term = searchInput.value.toLowerCase();
    document.querySelectorAll('.fw-item').forEach(item => {
      const name = item.getAttribute('data-fw').toLowerCase();
      const desc = item.querySelector('.fw-desc')?.innerText.toLowerCase() || '';
      item.style.display = (name.includes(term) || desc.includes(term)) ? '' : 'none';
    });
  }

  document.querySelectorAll('.fw-item').forEach(item => {
    item.addEventListener('click', async () => {
      if (flashingActive) { addLog("Cannot change firmware while flashing", "error"); return; }
      const name = item.getAttribute('data-fw');
      const file = item.getAttribute('data-file');
      await loadFirmware(name, file);
      if (window.innerWidth <= 768) closeSidebar();
    });
  });

  searchInput.addEventListener('input', filterFirmwares);
  selectPortBtn.addEventListener('click', connectToPort);
  flashBtn.addEventListener('click', startFlashing);

  if (!('serial' in navigator)) {
    addLog("Web Serial API unavailable", "error");
    selectPortBtn.disabled = true;
  }
  addLog("WebFlasher ready. Select firmware, connect serial port, then click FLASH.", "info");
  addLog("Using esptool-js (official ESP32 flashing protocol).", "info");
</script>
</body>
</html>
